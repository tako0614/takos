# Dispatch Worker configuration
# Deploy with: wrangler deploy -c wrangler.dispatch.toml
# Replace placeholder domains and namespace IDs before deploying.

name = "takos-dispatch"
main = "src/dispatch.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "no_handle_cross_request_promise_resolution"]
workers_dev = false

[observability]
enabled = true

[vars]
ADMIN_DOMAIN = "admin.example.com"
ROUTING_DO_PHASE = "4"

# KV for hostname routing
[[kv_namespaces]]
binding = "HOSTNAME_ROUTING"
id = "replace-with-kv-namespace-id"

# RoutingDO (owned by takos/takos-staging script)
[[durable_objects.bindings]]
name = "ROUTING_DO"
class_name = "RoutingDO"
script_name = "takos"

# Workers for Platforms dispatch namespace
[[dispatch_namespaces]]
binding = "DISPATCHER"
namespace = "your-dispatch-namespace"

[env.staging]
name = "takos-dispatch-staging"
workers_dev = true

[env.staging.vars]
ADMIN_DOMAIN = "test.takos.jp"
ROUTING_DO_PHASE = "4"

[[env.staging.kv_namespaces]]
binding = "HOSTNAME_ROUTING"
id = "8562573b04b44c44b744154b46cba71d"

[[env.staging.durable_objects.bindings]]
name = "ROUTING_DO"
class_name = "RoutingDO"
script_name = "takos-staging"

[[env.staging.dispatch_namespaces]]
binding = "DISPATCHER"
namespace = "takos-staging-tenants"
