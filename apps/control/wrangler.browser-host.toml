# takos-browser-host Worker configuration
# Hosts BrowserSessionContainer (CF Containers sidecar for browser automation).
#
# OSS-safe deployment template. Replace placeholder IDs, bucket names, and
# worker names before deploying.

name = "takos-browser-host"
main = "src/browser-host.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "no_handle_cross_request_promise_resolution"]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "BROWSER_CONTAINER"
class_name = "BrowserSessionContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BrowserSessionContainer"]

[[containers]]
class_name = "BrowserSessionContainer"
image = "../../../takos-computer/apps/browser/Dockerfile"
image_build_context = "../../.."
instance_type = "standard-2"
max_instances = 25

[[r2_buckets]]
binding = "BROWSER_CHECKPOINTS"
bucket_name = "takos-browser-checkpoints"

[[services]]
binding = "TAKOS_EGRESS"
service = "takos-worker"

[vars]
ADMIN_DOMAIN = "admin.example.com"

[env.staging]
name = "takos-browser-host-staging"
workers_dev = true

[env.staging.vars]
ADMIN_DOMAIN = "test.takos.jp"

[[env.staging.durable_objects.bindings]]
name = "BROWSER_CONTAINER"
class_name = "BrowserSessionContainer"

[[env.staging.containers]]
class_name = "BrowserSessionContainer"
image = "../../../takos-computer/apps/browser/Dockerfile"
image_build_context = "../../.."
instance_type = "standard-2"
max_instances = 10

[[env.staging.r2_buckets]]
binding = "BROWSER_CHECKPOINTS"
bucket_name = "takos-browser-checkpoints-staging"

[[env.staging.services]]
binding = "TAKOS_EGRESS"
service = "takos-worker-staging"
