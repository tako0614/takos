# takos-runtime-host Worker configuration
# Hosts TakosRuntimeContainer (CF Containers sidecar for takos-runtime).
# Called via RUNTIME_HOST service binding from takos (main worker) and takos-worker.
#
# The runtime container communicates back via /forward/* proxy endpoints on this
# worker, which proxies to takos via service binding. The host passes
# PLATFORM_PUBLIC_KEY to the container as JWT_PUBLIC_KEY for runtime-service
# request verification.
#
# OSS-safe deployment template. Replace placeholder domains and URLs before
# deploying.

name = "takos-runtime-host"
main = "src/runtime-host.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat", "no_handle_cross_request_promise_resolution"]

[observability]
enabled = true

[observability.logs]
head_sampling_rate = 0.1

# Secrets (set via wrangler secret put):
# - PLATFORM_PUBLIC_KEY: public key matching takos/takos-worker PLATFORM_PRIVATE_KEY.
# - JWT_PUBLIC_KEY: optional compatibility override; if set, it must match
#   PLATFORM_PUBLIC_KEY.

# Container DO binding
[[durable_objects.bindings]]
name = "RUNTIME_CONTAINER"
class_name = "TakosRuntimeContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TakosRuntimeContainer"]

# Container configuration — standard-2: 1 vCPU / 6 GiB
# Image is built from apps/runtime/Dockerfile with ecosystem root as context so
# the runtime image can include the standalone takos-cli sources.
[[containers]]
class_name = "TakosRuntimeContainer"
image = "../runtime/Dockerfile"
image_build_context = "../../.."
instance_type = "standard-2"
max_instances = 25

# Service binding to takos for proxying container requests
[[services]]
binding = "TAKOS_WEB"
service = "takos"

[vars]
ADMIN_DOMAIN = "admin.example.com"
PROXY_BASE_URL = "https://your-runtime-host.workers.dev"

[env.staging]
name = "takos-runtime-host-staging"
workers_dev = true

[[env.staging.services]]
binding = "TAKOS_WEB"
service = "takos-staging"

[env.staging.vars]
ADMIN_DOMAIN = "staging-admin.example.com"
PROXY_BASE_URL = "https://your-staging-runtime-host.workers.dev"

[[env.staging.durable_objects.bindings]]
name = "RUNTIME_CONTAINER"
class_name = "TakosRuntimeContainer"

[[env.staging.containers]]
class_name = "TakosRuntimeContainer"
image = "../runtime/Dockerfile"
image_build_context = "../../.."
instance_type = "standard-2"
max_instances = 5
