# takos-worker: unified background worker
# Consolidates: runner + indexer + workflow-runner + egress
#
# fetch     → egress proxy (SSRF-protected outbound HTTP, service-binding only)
# queue     → run dispatch, indexing, workflow/deployment execution
# scheduled → stale run recovery cron
#
# OSS-safe deployment template. Replace placeholder domains, account IDs,
# namespace IDs, and database IDs before deploying.

name = "takos-worker"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public", "no_handle_cross_request_promise_resolution"]

[observability]
enabled = true

[triggers]
crons = ["1-59/2 * * * *"]

[vars]
ADMIN_DOMAIN = "admin.example.com"
TENANT_BASE_DOMAIN = "app.example.com"
WFP_DISPATCH_NAMESPACE = "your-dispatch-namespace"
CF_ACCOUNT_ID = "replace-with-account-id"
CF_ZONE_ID = "replace-with-zone-id"
# Egress rate limit defaults
EGRESS_MAX_REQUESTS = "300"
EGRESS_WINDOW_MS = "60000"
EGRESS_RATE_LIMIT_ALGORITHM = "sliding_window"
EGRESS_RATE_LIMIT_SHADOW_SAMPLE_RATE = "0.01"
EGRESS_MAX_RESPONSE_BYTES = "26214400"
EGRESS_TIMEOUT_MS = "300000"

# --- Database ---

[[d1_databases]]
binding = "DB"
database_name = "takos-control-db"
database_id = "replace-with-d1-database-id"

# --- KV ---

[[kv_namespaces]]
binding = "HOSTNAME_ROUTING"
id = "replace-with-kv-namespace-id"

# --- Durable Objects (all external, owned by takos-web) ---

[[durable_objects.bindings]]
name = "RUN_NOTIFIER"
class_name = "RunNotifierDO"
script_name = "takos"

[[durable_objects.bindings]]
name = "ROUTING_DO"
class_name = "RoutingDO"
script_name = "takos"

[[durable_objects.bindings]]
name = "RATE_LIMITER_DO"
class_name = "RateLimiterDO"
script_name = "takos"

# --- R2 Buckets ---

[[r2_buckets]]
binding = "TAKOS_OFFLOAD"
bucket_name = "takos-offload"

[[r2_buckets]]
binding = "TENANT_SOURCE"
bucket_name = "takos-tenant-source"

[[r2_buckets]]
binding = "GIT_OBJECTS"
bucket_name = "takos-git-objects"

[[r2_buckets]]
binding = "WORKER_BUNDLES"
bucket_name = "takos-worker-bundles"

[[r2_buckets]]
binding = "TENANT_BUILDS"
bucket_name = "takos-tenant-builds"

# --- Queue Producers ---

[[queues.producers]]
queue = "takos-runs"
binding = "RUN_QUEUE"

[[queues.producers]]
queue = "takos-index-jobs"
binding = "INDEX_QUEUE"

[[queues.producers]]
queue = "takos-workflow-jobs"
binding = "WORKFLOW_QUEUE"

# --- Queue Consumers: runner ---

[[queues.consumers]]
queue = "takos-runs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-runs-dlq"

[[queues.consumers]]
queue = "takos-runs-dlq"
max_batch_size = 10
max_batch_timeout = 60

# --- Queue Consumers: indexer ---

[[queues.consumers]]
queue = "takos-index-jobs"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 2
dead_letter_queue = "takos-index-jobs-dlq"

[[queues.consumers]]
queue = "takos-index-jobs-dlq"
max_batch_size = 10
max_batch_timeout = 60

# --- Queue Consumers: workflow-runner ---

[[queues.consumers]]
queue = "takos-workflow-jobs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-workflow-jobs-dlq"

[[queues.consumers]]
queue = "takos-workflow-jobs-dlq"
max_batch_size = 10
max_batch_timeout = 60

[[queues.consumers]]
queue = "takos-deployment-jobs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-deployment-jobs-dlq"

[[queues.consumers]]
queue = "takos-deployment-jobs-dlq"
max_batch_size = 10
max_batch_timeout = 60

# --- AI / Vectorize ---

[[vectorize]]
binding = "VECTORIZE"
index_name = "takos-embeddings"

[ai]
binding = "AI"

[browser]
binding = "BROWSER"

# --- Service Bindings ---

[[services]]
binding = "RUNTIME_HOST"
service = "takos-runtime-host"

# Secrets (set via wrangler secret put):
# - CF_API_TOKEN: Cloudflare API token for deployment processing
# - ENCRYPTION_KEY: Encryption key for deployment processing
# - OPENAI_API_KEY / ANTHROPIC_API_KEY / GOOGLE_API_KEY: for embeddings

