apiVersion: takos.dev/v1alpha1
kind: App
metadata:
  name: notes-assistant
spec:
  version: 0.3.0
  description: Example current Takos app manifest
  category: app
  tags:
    - notes
    - ai
  capabilities:
    - mcp
    - file-handler
  env:
    required:
      - TAKOS_ACCESS_TOKEN
  takos:
    scopes:
      - threads:read
      - runs:write
  oauth:
    clientName: Notes Assistant
    redirectUris:
      - https://notes.example.com/oauth/callback
    scopes:
      - openid
      - profile
      - spaces:read
    autoEnv: true
  resources:
    primary-db:
      type: d1
      binding: DB
      migrations:
        up: .takos/migrations/primary-db/up
        down: .takos/migrations/primary-db/down
    assets:
      type: r2
      binding: ASSETS
    reminders:
      type: queue
      binding: REMINDERS
      queue:
        maxRetries: 5
    embeddings:
      type: vectorize
      binding: EMBEDDINGS
      vectorize:
        dimensions: 1536
        metric: cosine
  services:
    web:
      type: worker
      build:
        fromWorkflow:
          path: .takos/workflows/deploy.yml
          job: bundle
          artifact: web
          artifactPath: dist/worker
      env:
        PUBLIC_APP_NAME: Notes Assistant
      bindings:
        d1:
          - primary-db
        r2:
          - assets
        queues:
          - reminders
        vectorize:
          - embeddings
      triggers:
        schedules:
          - cron: "*/15 * * * *"
            export: scheduled
        queues:
          - queue: reminders
            export: queue
  routes:
    - name: app
      service: web
      path: /
      timeoutMs: 30000
  mcpServers:
    - name: notes
      route: /mcp
      transport: streamable-http
  fileHandlers:
    - name: markdown
      mimeTypes:
        - text/markdown
      extensions:
        - .md
      openPath: /files/:id
