## OSS-safe deployment template. Replace the example route before deploying.

name = "takos-docs"
main = "src/backend/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "developers.example.com"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"
