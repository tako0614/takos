# Takos monorepo workspace definition
#
# Structure:
#   apps/*          - First-party Takos applications (deployed as services)
#   packages/*      - Shared libraries consumed by apps
#   scripts         - Build/CI tooling
#
# Sibling product repos (`../road-to-me`, `../yurucommu`) are intentionally
# excluded. They are independent product roots with their own package managers
# and build pipelines.

packages:
  # --- First-party applications ---
  - 'apps/control'
  - 'apps/runtime'
  - 'apps/cli'
  - 'apps/executor'
  - 'apps/browser'
  - 'apps/docs-site'

  # --- Shared packages ---
  - 'packages/*'
  - 'packages/control/*'

  # --- Build tooling ---
  - 'scripts'
