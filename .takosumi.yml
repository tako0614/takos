apiVersion: v1

metadata:
  id: takos.chat
  name: Takos
  description: Self-hostable AI-first chat and agent product
  publisher: Takos
  homepage: https://takos.jp

components:
  # --- Storage ---
  db:
    kind: postgres # CF distribution では D1 (SQLite) に bind。SQL 方言の差異は app 側で吸収
    spec:
      version: '16' # postgres deployment でのみ有効。D1 では無視
      size: medium
      storage:
        sizeGiB: 50

  worker-bundles:
    kind: object-store
    spec:
      name: takos-worker-bundles

  tenant-builds:
    kind: object-store
    spec:
      name: takos-tenant-builds

  tenant-source:
    kind: object-store
    spec:
      name: takos-tenant-source

  offload:
    kind: object-store
    spec:
      name: takos-offload

  # --- Compute ---

  app:
    kind: worker
    spec:
      entrypoint: src/worker/src/worker/index.ts
    connect:
      db:
        output: db.connection
        inject: secret-env
        prefix: DB
      bundles:
        output: worker-bundles.bucket
        inject: secret-env
        prefix: WORKER_BUNDLES
      builds:
        output: tenant-builds.bucket
        inject: secret-env
        prefix: TENANT_BUILDS
      source:
        output: tenant-source.bucket
        inject: secret-env
        prefix: TENANT_SOURCE
      offload:
        output: offload.bucket
        inject: secret-env
        prefix: TAKOS_OFFLOAD
      git:
        output: git.http
        inject: env
        prefix: GIT
      agent:
        output: agent.http
        inject: env
        prefix: AGENT
    listen:
      identity:
        path: identity.primary.oidc
        inject: secret-env
        prefix: OIDC
        required: true
      billing:
        path: billing.primary.default
        inject: secret-env
        prefix: BILLING

  git:
    kind: web-service
    spec:
      image: ghcr.io/takos/takos-git:latest
      port: 8790
      scale:
        min: 1
        max: 2
      resources:
        cpu: '1'
        memory: 1Gi
    connect:
      db:
        output: db.connection
        inject: secret-env
        prefix: DB

  agent:
    kind: web-service
    spec:
      image: ghcr.io/takos/takos-agent:latest
      port: 8080
      scale:
        min: 1
        max: 4
      resources:
        cpu: '2'
        memory: 2Gi
    connect:
      db:
        output: db.connection
        inject: secret-env
        prefix: DB
      objects:
        output: offload.bucket
        inject: secret-env
        prefix: OBJECTS
      git:
        output: git.http
        inject: env
        prefix: GIT

  # --- Ingress ---

  public:
    kind: gateway
    connect:
      app:
        output: app.http
        inject: upstream
      git:
        output: git.http
        inject: upstream
    spec:
      listeners:
        public:
          protocol: https
          tls: auto
      routes:
        - listener: public
          path: /git
          to: git
        - listener: public
          path: /
          to: app

publish:
  public:
    output: public.public
    path: takos.http.public
