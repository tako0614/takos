services:
  postgres:
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
    security_opt:
      - apparmor=unconfined
    ulimits:
      core: 0
    healthcheck:
      disable: true

  postgres-init:
    depends_on:
      postgres:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until pg_isready -h postgres -U takos -d takos_app; do sleep 1; done
        psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname = 'takosumi'" | grep -q 1 || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE takosumi"
    security_opt:
      - apparmor=unconfined
    ulimits:
      core: 0
    healthcheck:
      disable: true

  redis:
    security_opt:
      - apparmor=unconfined
    ulimits:
      core: 0
    healthcheck:
      disable: true

  takosumi:
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    security_opt:
      - apparmor=unconfined
    ulimits:
      core: 0
    healthcheck:
      disable: true

  agent-proof-runtime:
    image: oven/bun:1.3
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command: ["bun", "scripts/local-agent-proof-runtime.ts"]
    environment:
      PORT: "8790"
      DATABASE_URL: "postgres://takos:takos@postgres:5432/takos_app"
      TAKOS_WORKER_DATABASE_URL: "postgres://takos:takos@postgres:5432/takos_app"
      REDIS_URL: "redis://redis:6379"
      OIDC_ISSUER_URL: "http://agent-proof-runtime:8790"
      TAKOS_AGENT_PROOF_CONTROL_BASE_URL: "http://agent-proof-runtime:8790"
      TAKOS_AGENT_PROOF_MODEL_BASE_URL: "http://agent-proof-runtime:8790/v1"
      TAKOS_AGENT_PROOF_SECRET: "${TAKOS_AGENT_PROOF_SECRET:-local-agent-proof-secret}"
      TAKOS_AGENT_PROOF_DISPATCH_SECRET: "${TAKOS_AGENT_PROOF_DISPATCH_SECRET:?TAKOS_AGENT_PROOF_DISPATCH_SECRET is required}"
      TAKOS_AGENT_PROOF_MODEL_KEY: "${TAKOS_AGENT_PROOF_MODEL_KEY:-local-agent-proof-model-key}"
      TAKOS_AGENT_INTERNAL_URL: "http://takos-agent:${TAKOS_AGENT_PORT:-8789}"
      TAKOS_AGENT_START_TOKEN: "${TAKOS_AGENT_START_TOKEN:-local-agent-start-token}"
      TAKOS_INTERNAL_API_SECRET: "${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}"
      OPENAI_API_KEY: "${TAKOS_AGENT_PROOF_MODEL_KEY:-local-agent-proof-model-key}"
      ENVIRONMENT: "development"
    ports:
      - "127.0.0.1:${TAKOS_AGENT_PROOF_PORT:-8790}:8790"
    volumes:
      - .:/workspace
      - ../takosumi:/takosumi:ro
    security_opt:
      - apparmor=unconfined
    ulimits:
      core: 0
    healthcheck:
      disable: true

  takos-worker:
    depends_on:
      agent-proof-runtime:
        condition: service_started
      redis:
        condition: service_started
    environment:
      TAKOS_LOCAL_EXECUTOR_HOST_URL: "http://agent-proof-runtime:8790"
      TAKOS_LOCAL_EXECUTOR_HOST_AUTH_TOKEN: "${TAKOS_AGENT_PROOF_DISPATCH_SECRET:?TAKOS_AGENT_PROOF_DISPATCH_SECRET is required}"
      OIDC_ISSUER_URL: "http://agent-proof-runtime:8790"
      OPENAI_API_KEY: "${TAKOS_AGENT_PROOF_MODEL_KEY:-local-agent-proof-model-key}"
      OPENAI_BASE_URL: "http://agent-proof-runtime:8790/v1"
      REDIS_URL: "redis://redis:6379"
      TAKOS_LOCAL_WORKER_SCHEDULED_INTERVAL_MS: "600000"
    security_opt:
      - apparmor=unconfined
    ulimits:
      core: 0
    healthcheck:
      disable: true

  takos-agent:
    build:
      labels:
        jp.takos.agent.source-sha256: "${TAKOS_AGENT_SOURCE_FINGERPRINT:?TAKOS_AGENT_SOURCE_FINGERPRINT is required}"
    depends_on:
      agent-proof-runtime:
        condition: service_started
      takosumi:
        condition: service_started
    security_opt:
      - apparmor=unconfined
    ulimits:
      core: 0
    healthcheck:
      disable: true
