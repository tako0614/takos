name: Release Replica Qualification

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: "Release-safety envelope release id"
        required: true
        type: string
      version:
        description: "Exact candidate version"
        required: true
        type: string
      source_commit:
        description: "Exact reviewed candidate source commit"
        required: true
        type: string
      candidate_run_id:
        description: "Successful immutable candidate workflow run id"
        required: true
        type: string
      candidate_manifest_digest:
        description: "SHA-256 of release-candidate-manifest.json"
        required: true
        type: string
      worker_digest:
        description: "Exact takos-worker candidate digest"
        required: true
        type: string
      agent_digest:
        description: "Exact takos-agent candidate digest"
        required: true
        type: string
      runtime_digest:
        description: "Exact takos-worker-runtime candidate digest"
        required: true
        type: string

run-name: replica-qualification:${{ inputs.release_id }}:${{ inputs.candidate_run_id }}

concurrency:
  group: takos-release-replica-${{ inputs.release_id }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PREVIOUS_WORKER_DIGEST: sha256:ba8f0af05473728707168fc3a2e37568691767b706b3a78378c0e61ad485fc9b
  PREVIOUS_AGENT_DIGEST: sha256:8e01bf1a2eb3530b8ed941acc455ebe01e021e9e025eaa5bfe1119dd8647c0d6
  PREVIOUS_RUNTIME_DIGEST: sha256:3164eb048307bc054b848f61656d4899ef1bed6ea4e43636ec852580eca4e474

jobs:
  qualify:
    name: Fresh exact-digest install and upgrade replica
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out reviewed qualification controller
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          path: control
          persist-credentials: false

      - name: Check out exact candidate source without rebuilding it
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          ref: ${{ inputs.source_commit }}
          path: source
          persist-credentials: false

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # pinned: v6.5.0 (2026)
        with:
          node-version: "24.18.0"

      - name: Verify reviewed qualification workflow authority
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF}" == "refs/heads/main" ]]
          [[ "$(git -C control rev-parse HEAD)" == "${GITHUB_SHA}" ]]
          main_sha="$(git ls-remote https://github.com/${GITHUB_REPOSITORY}.git refs/heads/main | awk '{print $1}')"
          [[ "${main_sha}" == "${GITHUB_SHA}" ]]

      - name: Verify candidate workflow authority
        id: authority
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          [[ "${CANDIDATE_RUN_ID}" =~ ^[0-9]+$ ]]
          [[ "${SOURCE_COMMIT}" =~ ^[0-9a-f]{40}$ ]]
          echo "source_commit_short=${SOURCE_COMMIT:0:12}" >> "${GITHUB_OUTPUT}"
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE_RUN_ID}")"
          jq -e \
            --arg source "${SOURCE_COMMIT}" \
            '.head_sha == $source and
             .event == "workflow_dispatch" and
             .status == "completed" and
             .conclusion == "success" and
             .run_attempt == 1 and
             .path == ".github/workflows/release-artifacts.yml"' \
            <<<"${run_json}" >/dev/null

      - name: Download exact immutable candidate bytes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pinned: v8.0.1 (2026)
        with:
          name: takos-release-candidate-${{ inputs.version }}-${{ steps.authority.outputs.source_commit_short }}
          path: candidate
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}

      - name: Verify candidate manifest, source, and three exact OCI digests
        shell: bash
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          RELEASE_VERSION: ${{ inputs.version }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          WORKER_DIGEST: ${{ inputs.worker_digest }}
          AGENT_DIGEST: ${{ inputs.agent_digest }}
          RUNTIME_DIGEST: ${{ inputs.runtime_digest }}
        run: |
          set -euo pipefail
          candidate_dir="${GITHUB_WORKSPACE}/candidate"
          manifest="${candidate_dir}/release-candidate-manifest.json"
          actual_manifest_digest="sha256:$(sha256sum "${manifest}" | awk '{print $1}')"
          [[ "${actual_manifest_digest}" == "${CANDIDATE_MANIFEST_DIGEST}" ]]
          bun source/scripts/release-candidate-contract.ts verify \
            --candidate-dir "${candidate_dir}" \
            --repository "https://github.com/${GITHUB_REPOSITORY}.git" \
            --source-commit "${SOURCE_COMMIT}" \
            --version "${RELEASE_VERSION}" \
            --takosumi-source-commit "$(grep -E '^  TAKOSUMI_SOURCE_REF:' source/.github/workflows/release-artifacts.yml | awk '{print $2}')" \
            --candidate-run-id "${CANDIDATE_RUN_ID}" \
            --manifest-digest "${CANDIDATE_MANIFEST_DIGEST}" \
            --policy source/.github/workflows/release-artifacts.yml \
            --toolchain source/bun.lock >/dev/null
          jq -e \
            --arg source "${SOURCE_COMMIT}" \
            --arg version "${RELEASE_VERSION}" \
            --arg run "${CANDIDATE_RUN_ID}" \
            --arg worker "${WORKER_DIGEST}" \
            --arg agent "${AGENT_DIGEST}" \
            --arg runtime "${RUNTIME_DIGEST}" \
            '.sourceCommit == $source and .version == $version and .workflowRunId == $run and
             [.ociImages[] | {name, digest}] == [
               {name:"takos-worker", digest:$worker},
               {name:"takos-agent", digest:$agent},
               {name:"takos-worker-runtime", digest:$runtime}
             ]' "${manifest}" >/dev/null

      - name: Prepare file-backed digest authority
        shell: bash
        env:
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
        run: |
          set -euo pipefail
          umask 077
          authority_dir="${RUNNER_TEMP}/takos-release-digest-authority-${GITHUB_RUN_ID}"
          install -d -m 700 "${authority_dir}"
          write_digest() {
            local file_name="$1"
            local digest="$2"
            [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]
            printf '%s\n' "${digest}" > "${authority_dir}/${file_name}"
            chmod 600 "${authority_dir}/${file_name}"
            [[ "$(stat -c '%s' "${authority_dir}/${file_name}")" == "72" ]]
          }
          write_digest candidate-manifest.digest "${CANDIDATE_MANIFEST_DIGEST}"
          write_digest previous-worker.digest "${PREVIOUS_WORKER_DIGEST}"
          write_digest previous-agent.digest "${PREVIOUS_AGENT_DIGEST}"
          write_digest previous-runtime.digest "${PREVIOUS_RUNTIME_DIGEST}"
          [[ "$(stat -c '%a' "${authority_dir}")" == "700" ]]
          [[ "$(find "${authority_dir}" -mindepth 1 -maxdepth 1 -type f | wc -l)" == "4" ]]

      - name: Login to GHCR for exact digest pulls only
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # pinned: v4.2.0 (2026)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run fresh production-equivalent replica qualification
        id: qualify
        shell: bash
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          WORKER_DIGEST: ${{ inputs.worker_digest }}
          AGENT_DIGEST: ${{ inputs.agent_digest }}
          RUNTIME_DIGEST: ${{ inputs.runtime_digest }}
          DIGEST_AUTHORITY_DIR: ${{ runner.temp }}/takos-release-digest-authority-${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          chmod 700 evidence
          node --experimental-strip-types control/scripts/release-replica-qualification.ts \
            --release-id "${RELEASE_ID}" \
            --source-commit "${SOURCE_COMMIT}" \
            --workflow-commit "${GITHUB_SHA}" \
            --candidate-run-id "${CANDIDATE_RUN_ID}" \
            --candidate-manifest-digest "${CANDIDATE_MANIFEST_DIGEST}" \
            --candidate-manifest "${GITHUB_WORKSPACE}/candidate/release-candidate-manifest.json" \
            --digest-authority-dir "${DIGEST_AUTHORITY_DIR}" \
            --source-dir "${GITHUB_WORKSPACE}/source" \
            --output "${GITHUB_WORKSPACE}/evidence/release-replica-qualification.json" \
            --worker-digest "${WORKER_DIGEST}" \
            --agent-digest "${AGENT_DIGEST}" \
            --runtime-digest "${RUNTIME_DIGEST}" \
            --previous-worker-digest "${PREVIOUS_WORKER_DIGEST}" \
            --previous-agent-digest "${PREVIOUS_AGENT_DIGEST}" \
            --previous-runtime-digest "${PREVIOUS_RUNTIME_DIGEST}"
          jq -e '.status == "verified" and .productionEquivalent == true' \
            evidence/release-replica-qualification.json >/dev/null
          [[ "$(stat -c '%a' evidence)" == "700" ]]
          [[ "$(stat -c '%a' evidence/release-replica-qualification.json)" == "600" ]]
          sha256sum evidence/release-replica-qualification.json \
            > evidence/release-replica-qualification.json.sha256

      - name: Upload immutable qualification evidence
        if: always() && steps.qualify.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned: v7.0.1 (2026)
        with:
          name: takos-release-replica-${{ inputs.release_id }}-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 7
