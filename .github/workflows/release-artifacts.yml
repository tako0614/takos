name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer used for the dry-run release manifest on manual runs'
        required: false
        default: '0.0.0-dev'
        type: string
      publish:
        description: 'Publish OCI images instead of dry-run build only'
        required: false
        default: false
        type: boolean

concurrency:
  group: takos-release-artifacts-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Release gate inputs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # pinned: v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pinned: v5.0.5 (2026)
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-takos-release-artifacts-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-takos-release-artifacts-

      - run: bun install --frozen-lockfile
      - run: bun run check

  oci-images:
    name: OCI image (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: takos-worker
            context: ..
            dockerfile: takos/deploy/docker/takos-worker.Dockerfile
          - image: takos-git
            context: ..
            dockerfile: takos/containers/git/Dockerfile
          - image: takos-agent
            context: ..
            dockerfile: takos/containers/agent/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # pinned: v4.1.0 (2026)

      - name: Login to GHCR
        if: github.event_name == 'push' || inputs.publish == true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # pinned: v4.2.0 (2026)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # pinned: v6.1.0 (2026)
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
            type=sha,prefix=sha-

      - name: Build and publish OCI image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # pinned: v7.2.0 (2026)
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' || inputs.publish == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      - name: Record image digest metadata
        if: github.event_name == 'push' || inputs.publish == true
        shell: bash
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest for ${{ matrix.image }}: ${IMAGE_DIGEST}" >&2
            exit 1
          fi
          mkdir -p dist/image-digests
          tags_json="$(printf '%s\n' "${IMAGE_TAGS}" | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          jq -n \
            --arg name "${{ matrix.image }}" \
            --arg image "${IMAGE_NAME}" \
            --arg digest "${IMAGE_DIGEST}" \
            --arg digestRef "${IMAGE_NAME}@${IMAGE_DIGEST}" \
            --arg commit "${GITHUB_SHA}" \
            --arg workflowRun "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --argjson tags "${tags_json}" \
            '{
              name: $name,
              image: $image,
              digest: $digest,
              digestRef: $digestRef,
              tags: $tags,
              commit: $commit,
              workflowRun: $workflowRun,
              sbom: true,
              provenance: true
            }' > "dist/image-digests/${{ matrix.image }}.json"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned: v7.0.1 (2026)
        if: github.event_name == 'push' || inputs.publish == true
        with:
          name: takos-image-digest-${{ matrix.image }}
          path: dist/image-digests/${{ matrix.image }}.json
          if-no-files-found: error

  release-manifest:
    name: Release manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate, oci-images]
    if: github.event_name == 'push' || inputs.publish == true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # pinned: v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pinned: v8.0.1 (2026)
        with:
          pattern: takos-image-digest-*
          path: dist/image-digests
          merge-multiple: true

      - name: Build release manifest
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          else
            release_version="${VERSION}"
            release_tag="v${VERSION}"
          fi
          if [[ ! "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer release version: ${release_version}" >&2
            exit 1
          fi
          bun scripts/build-release-manifest.ts \
            --image-digest-dir dist/image-digests \
            --release-version "${release_version}" \
            --release-tag "${release_tag}" \
            --require-image-digests \
            --output dist/release-manifest.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned: v7.0.1 (2026)
        with:
          name: takos-release-manifest
          path: dist/release-manifest.json
          if-no-files-found: error
