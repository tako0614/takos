name: Takosumi Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
      dry_run:
        description: 'Dry run only'
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: takosumi-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - name: Deploy via Takosumi Deploy Control
        env:
          TAKOSUMI_URL: ${{ secrets.TAKOSUMI_URL }}
          TAKOSUMI_TOKEN: ${{ secrets.TAKOSUMI_TOKEN }}
          TAKOSUMI_SPACE_ID: ${{ secrets.TAKOSUMI_SPACE_ID }}
          TAKOSUMI_INSTALLATION_ID: ${{ secrets.TAKOSUMI_INSTALLATION_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          chmod +x scripts/takosumi-deploy.sh
          if [ "${DRY_RUN}" = "true" ]; then
            ./scripts/takosumi-deploy.sh --plan-only
          else
            ./scripts/takosumi-deploy.sh
          fi
