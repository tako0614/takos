name: Patch Management

on:
  schedule:
    - cron: '24 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: patch-management-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task validate:patch-management

  filesystem-cve-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate-policy
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,misconfig'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          format: 'table'
