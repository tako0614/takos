# Bun migration: keep the legacy Deno compatibility shim preloaded while the
# container runs under Bun. Source uses native Bun/Node wrappers; the shim keeps
# older transitive/runtime entrypoints from failing if they still touch Deno.*.
[test]
preload = ["./shims/deno-compat.ts"]

[run]
preload = ["./shims/deno-compat.ts"]
