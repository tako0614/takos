# Takos build configuration
# Workers kind requires bundled JS — raw TS won't run on the edge.
# Container images are built separately via CI and pushed to ghcr.io.

components:
  worker:
    workingDir: .
    steps:
      - run: bun install --frozen-lockfile
      - run: bun run web:build
    output:
      entrypoint: src/worker/index.ts
