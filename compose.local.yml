services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takos
      POSTGRES_PASSWORD: takos
      POSTGRES_DB: takos_app
    ports:
      - '${TAKOS_POSTGRES_PORT:-15432}:5432'
    volumes:
      - takos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U takos -d takos_app']
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    environment:
      PGPASSWORD: takos
    entrypoint:
      - /bin/sh
      - -c
      - |
          psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname = 'takosumi'" | grep -q 1 || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE takosumi"
          psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname = 'takos_git'" | grep -q 1 || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE takos_git"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${TAKOS_REDIS_PORT:-16379}:6379'
    volumes:
      - takos-redis:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  takos-worker:
    image: oven/bun:1.3
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command: ['bun', 'run', 'dev']
    healthcheck:
      test:
        - 'CMD'
        - 'bun'
        - '-e'
        - 'const r = await fetch(`http://localhost:$${process.env.PORT ?? "8787"}/health`); if (!r.ok) process.exit(1);'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      PORT: '${TAKOS_WORKER_PORT:-8787}'
      TAKOS_WORKER_URL: '${TAKOS_WORKER_URL:-http://localhost:8787}'
      TAKOS_GIT_INTERNAL_URL: 'http://takos-git:${TAKOS_GIT_PORT:-8790}'
      TAKOSUMI_INTERNAL_URL: 'http://takosumi:${TAKOSUMI_PORT:-8788}'
      TAKOS_AGENT_INTERNAL_URL: 'http://takos-agent:${TAKOS_AGENT_PORT:-8789}'
      TAKOS_AGENT_START_TOKEN: '${TAKOS_AGENT_START_TOKEN:-local-agent-start-token}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOS_INTERNAL_API_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOS_WORKER_DATABASE_URL: 'postgres://takos:takos@postgres:5432/takos_app'
      DATABASE_URL: 'postgres://takos:takos@postgres:5432/takos_app'
    ports:
      - '${TAKOS_WORKER_PORT:-8787}:${TAKOS_WORKER_PORT:-8787}'
    volumes:
      - .:/workspace
      - ../takosumi:/takosumi:ro

  takos-git:
    build:
      context: ..
      dockerfile: takos/containers/git/Dockerfile
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace/containers/git
    command: ['bun', 'run', 'dev']
    healthcheck:
      test:
        - 'CMD'
        - 'bun'
        - '-e'
        - 'const r = await fetch(`http://localhost:$${process.env.PORT ?? "8790"}/health`); if (!r.ok) process.exit(1);'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      PORT: '${TAKOS_GIT_PORT:-8790}'
      TAKOS_GIT_INTERNAL_URL: 'http://takos-git:${TAKOS_GIT_PORT:-8790}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOS_GIT_REPOSITORY_ROOT: '/var/lib/takos-git/repositories'
      TAKOS_GIT_DATABASE_URL: 'sqlite:///var/lib/takos-git/repositories/.takos/containers/git.sqlite'
      GIT_CONFIG_COUNT: '1'
      GIT_CONFIG_KEY_0: 'safe.directory'
      GIT_CONFIG_VALUE_0: '*'
    ports:
      - '${TAKOS_GIT_PORT:-8790}:${TAKOS_GIT_PORT:-8790}'
    volumes:
      - .:/workspace
      - ../takosumi:/takosumi:ro
      - takos-git-node-modules:/workspace/containers/git/node_modules
      - '${TAKOS_GIT_REPOSITORY_HOST_ROOT:-./.takos-git/repositories}:/var/lib/takos-git/repositories'

  takosumi:
    image: denoland/deno:2.7.10
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ['deno', 'task', '--cwd', 'packages/kernel', 'start']
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'deno eval ''const r = await fetch("http://localhost:$${PORT:-8788}/health"); if (!r.ok) throw new Error("unhealthy")'''
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    working_dir: /workspace
    environment:
      PORT: '${TAKOSUMI_PORT:-8788}'
      TAKOS_WORKER_URL: '${TAKOS_WORKER_URL:-http://takos-worker:8787}'
      TAKOSUMI_INTERNAL_URL: 'http://takosumi:${TAKOSUMI_PORT:-8788}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOSUMI_INTERNAL_API_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOSUMI_DATABASE_URL: 'postgres://takos:takos@postgres:5432/takosumi'
      DATABASE_URL: 'postgres://takos:takos@postgres:5432/takosumi'
      TAKOSUMI_DEV_MODE: '${TAKOSUMI_DEV_MODE:-1}'
    ports:
      - '${TAKOSUMI_PORT:-8788}:${TAKOSUMI_PORT:-8788}'
    volumes:
      - ../takosumi:/workspace

  takos-agent:
    build:
      context: ..
      dockerfile: takos/containers/agent/Dockerfile
    depends_on:
      takosumi:
        condition: service_healthy
    environment:
      PORT: '${TAKOS_AGENT_PORT:-8789}'
      TAKOSUMI_INTERNAL_URL: 'http://takosumi:${TAKOSUMI_PORT:-8788}'
      TAKOS_GIT_INTERNAL_URL: 'http://takos-git:${TAKOS_GIT_PORT:-8790}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOS_AGENT_START_TOKEN: '${TAKOS_AGENT_START_TOKEN:-local-agent-start-token}'
    ports:
      - '${TAKOS_AGENT_PORT:-8789}:${TAKOS_AGENT_PORT:-8789}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:$${PORT:-8789}/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  takos-postgres:
  takos-redis:
  takos-git-node-modules:
