services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takos
      POSTGRES_PASSWORD: takos
      POSTGRES_DB: takos_app
    ports:
      - '${TAKOS_POSTGRES_PORT:-15432}:5432'
    volumes:
      - takos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U takos -d takos_app']
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    environment:
      PGPASSWORD: takos
    entrypoint:
      - /bin/sh
      - -c
      - |
          psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname = 'takos_paas'" | grep -q 1 || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE takos_paas"
          psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname = 'takos_git'" | grep -q 1 || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE takos_git"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${TAKOS_REDIS_PORT:-16379}:6379'
    volumes:
      - takos-redis:/data

  takos-app:
    image: denoland/deno:latest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command: ['deno', 'task', 'dev:api']
    environment:
      PORT: '${TAKOS_APP_PORT:-8787}'
      TAKOS_APP_URL: '${TAKOS_APP_URL:-http://localhost:8787}'
      TAKOS_GIT_INTERNAL_URL: 'http://takos-git:${TAKOS_GIT_PORT:-8790}'
      TAKOS_PAAS_INTERNAL_URL: 'http://takos-paas:${TAKOS_PAAS_PORT:-8788}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOS_APP_DATABASE_URL: 'postgres://takos:takos@postgres:5432/takos_app'
    ports:
      - '${TAKOS_APP_PORT:-8787}:${TAKOS_APP_PORT:-8787}'
    volumes:
      - ./app:/workspace
      - ./paas:/paas:ro
      - ./git:/git:ro

  takos-git:
    image: denoland/deno:latest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command: ['deno', 'task', 'dev']
    environment:
      PORT: '${TAKOS_GIT_PORT:-8790}'
      TAKOS_GIT_INTERNAL_URL: 'http://takos-git:${TAKOS_GIT_PORT:-8790}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOS_GIT_DATABASE_URL: 'postgres://takos:takos@postgres:5432/takos_git'
    ports:
      - '${TAKOS_GIT_PORT:-8790}:${TAKOS_GIT_PORT:-8790}'
    volumes:
      - ./git:/workspace

  takos-paas:
    image: denoland/deno:latest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    command: ['deno', 'task', 'dev:paas']
    working_dir: /workspace
    environment:
      PORT: '${TAKOS_PAAS_PORT:-8788}'
      TAKOS_APP_URL: '${TAKOS_APP_URL:-http://takos-app:8787}'
      TAKOS_PAAS_INTERNAL_URL: 'http://takos-paas:${TAKOS_PAAS_PORT:-8788}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
      TAKOS_PAAS_DATABASE_URL: 'postgres://takos:takos@postgres:5432/takos_paas'
      DATABASE_URL: 'postgres://takos:takos@postgres:5432/takos_paas'
      REDIS_URL: 'redis://redis:6379'
    ports:
      - '${TAKOS_PAAS_PORT:-8788}:${TAKOS_PAAS_PORT:-8788}'
    volumes:
      - ./paas:/workspace

  takos-agent:
    build:
      context: ..
      dockerfile: takos/agent/Dockerfile
    depends_on:
      takos-paas:
        condition: service_started
    environment:
      PORT: '${TAKOS_AGENT_PORT:-8789}'
      TAKOS_PAAS_INTERNAL_URL: 'http://takos-paas:${TAKOS_PAAS_PORT:-8788}'
      TAKOS_GIT_INTERNAL_URL: 'http://takos-git:${TAKOS_GIT_PORT:-8790}'
      TAKOS_INTERNAL_SERVICE_SECRET: '${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}'
    ports:
      - '${TAKOS_AGENT_PORT:-8789}:${TAKOS_AGENT_PORT:-8789}'

volumes:
  takos-postgres:
  takos-redis:
