services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takos
      POSTGRES_PASSWORD: takos
      POSTGRES_DB: takos_web
    ports:
      - "${TAKOS_POSTGRES_PORT:-15432}:5432"
    volumes:
      - takos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takos -d takos_web"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: takos
    entrypoint:
      - /bin/sh
      - -c
      - |
        psql -h postgres -U takos -d takos_web -tc "SELECT 1 FROM pg_database WHERE datname = 'takos_paas'" | grep -q 1 || psql -h postgres -U takos -d takos_web -c "CREATE DATABASE takos_paas"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${TAKOS_REDIS_PORT:-16379}:6379"
    volumes:
      - takos-redis:/data

  takos-web:
    image: denoland/deno:latest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command: ["deno", "task", "dev:api"]
    environment:
      PORT: "${TAKOS_WEB_PORT:-8787}"
      TAKOS_WEB_URL: "${TAKOS_WEB_URL:-http://localhost:8787}"
      TAKOS_PAAS_INTERNAL_URL: "http://takos-paas:${TAKOS_PAAS_PORT:-8788}"
      TAKOS_INTERNAL_SERVICE_SECRET: "${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}"
      TAKOS_WEB_DATABASE_URL: "postgres://takos:takos@postgres:5432/takos_web"
    ports:
      - "${TAKOS_WEB_PORT:-8787}:${TAKOS_WEB_PORT:-8787}"
    volumes:
      - ./web:/workspace
      - ./paas:/paas:ro

  takos-paas:
    build:
      context: ./paas
      dockerfile: apps/control/Dockerfile.local
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    command: ["deno", "task", "dev:local:web"]
    working_dir: /workspace/apps/control
    environment:
      PORT: "${TAKOS_PAAS_PORT:-8788}"
      TAKOS_WEB_URL: "${TAKOS_WEB_URL:-http://takos-web:8787}"
      TAKOS_PAAS_INTERNAL_URL: "http://takos-paas:${TAKOS_PAAS_PORT:-8788}"
      TAKOS_INTERNAL_SERVICE_SECRET: "${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}"
      TAKOS_PAAS_DATABASE_URL: "postgres://takos:takos@postgres:5432/takos_paas"
      DATABASE_URL: "postgres://takos:takos@postgres:5432/takos_paas"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "${TAKOS_PAAS_PORT:-8788}:${TAKOS_PAAS_PORT:-8788}"

  takos-agent:
    build:
      context: ..
      dockerfile: takos/agent/Dockerfile
    depends_on:
      takos-paas:
        condition: service_started
    environment:
      PORT: "${TAKOS_AGENT_PORT:-8789}"
      TAKOS_PAAS_INTERNAL_URL: "http://takos-paas:${TAKOS_PAAS_PORT:-8788}"
      TAKOS_INTERNAL_SERVICE_SECRET: "${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}"
    ports:
      - "${TAKOS_AGENT_PORT:-8789}:${TAKOS_AGENT_PORT:-8789}"

volumes:
  takos-postgres:
  takos-redis:
