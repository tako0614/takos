# Self-hosted fail-closed overlay template.
# This file is not a complete production profile by itself: every empty
# runtimeConfig.plugins entry and every image tag must be supplied by the
# operator before Helm render/apply.
# Usage:
#   helm install takos . -f values.yaml -f values-selfhosted.yaml \
#     --set images.takosWorker.tag=<tag> \
#     --set images.takosumi.tag=<tag> \
#     --set images.takosumiAccounts.tag=<tag> \
#     --set images.takosGit.tag=<tag> \
#     --set images.takosAgent.tag=<tag>

runtimeConfig:
  environment: production
  publicRoutesEnabled: true
  defaultApps:
    preinstallEnabled: false
  # Empty plugin ids intentionally fail runtime config validation. Override
  # every plugin id with trusted non-reference plugins.
  plugins:
    auth: ""
    notification: ""
    operator-config: ""
    storage: ""
    source: ""
    provider: ""
    queue: ""
    object-storage: ""
    kms: ""
    secret-store: ""
    router-config: ""
    observability: ""
    runtime-agent: ""

domains:
  admin: "admin.takos.example.internal"
  tenantBase: "app.takos.example.internal"
  accounts: "accounts.takos.example.internal"

secrets:
  create: false
  existingSecrets:
    platform: "takos-platform"
    auth: "takos-auth"
    llm: "takos-llm"

accounts:
  issuer: "https://accounts.takos.example.internal"
  redirectUri: "https://admin.takos.example.internal/auth/oidc/callback"
  persistence:
    enabled: true
    runMigrations: false
    databaseUrlSecretName: "takos-platform"
    databaseUrlSecretKey: "TAKOSUMI_ACCOUNTS_DATABASE_URL"

ingress:
  enabled: true
  className: "caddy"
  annotations: {}
  gcpManagedCertificate:
    enabled: false
    name: ""
    domains: []
  tls:
    enabled: true
    secretName: "takos-tls"
    clusterIssuer: ""

serviceAccount:
  create: true
  annotations: {}
