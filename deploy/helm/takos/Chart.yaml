apiVersion: v2
name: takos
description: Takos AI platform - multi-tenant agent runtime
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: minio
    version: "14.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled
