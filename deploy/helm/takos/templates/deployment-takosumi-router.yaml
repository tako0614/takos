apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-takosumi-router
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/process-role: takosumi-router
    app.kubernetes.io/component: takosumi-router
spec:
  replicas: {{ .Values.paasRouter.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: takosumi-router
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        takos.io/process-role: takosumi-router
        app.kubernetes.io/component: takosumi-router
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: takosumi-router
          image: "{{ .Values.images.control.repository }}:{{ .Values.images.control.tag }}"
          imagePullPolicy: {{ .Values.images.control.pullPolicy }}
          command: ["deno", "task", "start"]
          ports:
            - name: http
              containerPort: {{ .Values.paasRouter.port }}
              protocol: TCP
          env:
            - name: TAKOSUMI_PROCESS_ROLE
              value: "takosumi-router"
            - name: PORT
              value: {{ .Values.paasRouter.port | quote }}
            - name: TAKOS_LOCAL_WEB_URL
              value: {{ include "takos.paasApiUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.auth | default (printf "%s-auth" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.llm | default (printf "%s-llm" (include "takos.fullname" .)) }}
                optional: true
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.paasRouter.resources | nindent 12 }}
