apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-takosumi
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/service-id: takosumi
    app.kubernetes.io/component: takosumi
spec:
  replicas: {{ .Values.services.takosumi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: takosumi
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        takos.io/service-id: takosumi
        app.kubernetes.io/component: takosumi
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: takosumi
          image: "{{ include "takos.image" (dict "root" . "image" .Values.images.takosumi) }}"
          imagePullPolicy: {{ .Values.images.takosumi.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.takosumi.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.services.takosumi.port | quote }}
            - name: TAKOSUMI_SERVICE_ID
              value: "takosumi"
            - name: TAKOS_APP_INTERNAL_URL
              value: {{ include "takos.appUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
          livenessProbe:
            httpGet:
              path: {{ .Values.services.takosumi.healthPath | quote }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.services.takosumi.healthPath | quote }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.services.takosumi.resources | nindent 12 }}
