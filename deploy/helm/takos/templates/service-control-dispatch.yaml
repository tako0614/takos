apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-control-dispatch
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-dispatch
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.controlDispatch.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: control-dispatch
    {{- include "takos.selectorLabels" . | nindent 4 }}
