apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-takosumi-log-worker
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: takosumi-log-worker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.paasLogWorker.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: takosumi-log-worker
    {{- include "takos.selectorLabels" . | nindent 4 }}
