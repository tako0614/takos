apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "takos.fullname" . }}-oci-orchestrator
  labels:
    {{- include "takos.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "takos.fullname" . }}-oci-orchestrator
  labels:
    {{- include "takos.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "takos.fullname" . }}-oci-orchestrator
  labels:
    {{- include "takos.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "takos.fullname" . }}-oci-orchestrator
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "takos.fullname" . }}-oci-orchestrator
