apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "takos.fullname" . }}-global
  labels:
    {{- include "takos.labels" . | nindent 4 }}
data:
  TAKOS_ENVIRONMENT: {{ .Values.runtimeConfig.environment | default "local" | quote }}
  TAKOS_PUBLIC_ROUTES_ENABLED: {{ ternary "1" "0" (.Values.runtimeConfig.publicRoutesEnabled | default false) | quote }}
  {{ if .Values.runtimeConfig.allowUnsafeProductionDefaults }}
  TAKOS_ALLOW_UNSAFE_PRODUCTION_DEFAULTS: "1"
  {{ end }}
  {{ with .Values.runtimeConfig.operatorProfile }}
  TAKOS_OPERATOR_PROFILE_JSON: {{ toJson . | quote }}
  {{ end }}
  {{ with .Values.runtimeConfig.managedResources }}
  TAKOS_MANAGED_RESOURCES_JSON: {{ toJson . | quote }}
  {{ end }}
  {{ with .Values.runtimeConfig.defaultAppDistributionJson }}
  TAKOS_DEFAULT_APP_DISTRIBUTION_JSON: {{ . | quote }}
  {{ end }}
  {{ with .Values.runtimeConfig.defaultApps }}
  TAKOS_DEFAULT_APPS_PREINSTALL: {{ ternary "true" "false" (.preinstallEnabled | default false) | quote }}
  {{ with .installUrl }}
  TAKOS_DEFAULT_APP_INSTALL_URL: {{ . | quote }}
  {{ end }}
  {{ with .installAccountId }}
  TAKOS_DEFAULT_APP_INSTALL_ACCOUNT_ID: {{ . | quote }}
  {{ end }}
  {{ with .installSubject }}
  TAKOS_DEFAULT_APP_INSTALL_SUBJECT: {{ . | quote }}
  {{ end }}
  {{ with .installMode }}
  TAKOS_DEFAULT_APP_INSTALL_MODE: {{ . | quote }}
  {{ end }}
  {{ with .installRuntimeBaseUrl }}
  TAKOS_DEFAULT_APP_INSTALL_RUNTIME_BASE_URL: {{ . | quote }}
  {{ end }}
  {{ end }}
  ADMIN_DOMAIN: {{ .Values.domains.admin | quote }}
  TENANT_BASE_DOMAIN: {{ .Values.domains.tenantBase | quote }}
  TAKOS_WORKER_INTERNAL_URL: {{ include "takos.workerUrl" . | quote }}
  TAKOSUMI_INTERNAL_URL: {{ include "takos.takosumiUrl" . | quote }}
  TAKOSUMI_ACCOUNTS_INTERNAL_URL: {{ include "takos.accountsUrl" . | quote }}
  TAKOSUMI_ACCOUNTS_ISSUER: {{ include "takos.accountsIssuer" . | quote }}
  TAKOS_GIT_INTERNAL_URL: {{ include "takos.gitUrl" . | quote }}
  TAKOS_AGENT_INTERNAL_URL: {{ include "takos.agentUrl" . | quote }}
  OIDC_ISSUER_URL: {{ include "takos.accountsIssuer" . | quote }}
  OIDC_DISCOVERY_URL: {{ include "takos.accountsUrl" . | quote }}
  OIDC_CLIENT_ID: {{ .Values.accounts.clientId | quote }}
  OIDC_REDIRECT_URI: {{ include "takos.oidcRedirectUri" . | quote }}
  NODE_ENV: {{ .Values.runtimeConfig.environment | default "local" | quote }}
