apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "takos.fullname" . }}-global
  labels:
    {{- include "takos.labels" . | nindent 4 }}
data:
  ADMIN_DOMAIN: {{ .Values.domains.admin | quote }}
  TENANT_BASE_DOMAIN: {{ .Values.domains.tenantBase | quote }}
  S3_REGION: {{ .Values.externalS3.region | default "us-east-1" | quote }}
  S3_BUCKET: {{ .Values.externalS3.bucket | default "takos-tenant-source" | quote }}
  S3_ENDPOINT: {{ include "takos.s3Endpoint" . | quote }}
  TAKOS_LOCAL_DATA_DIR: "/var/lib/takos/control"
  NODE_ENV: "production"
