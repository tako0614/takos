apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "takos.fullname" . }}-global
  labels:
    {{- include "takos.labels" . | nindent 4 }}
data:
  ADMIN_DOMAIN: {{ .Values.domains.admin | quote }}
  TENANT_BASE_DOMAIN: {{ .Values.domains.tenantBase | quote }}
  AWS_REGION: {{ .Values.externalS3.region | default "us-east-1" | quote }}
  AWS_S3_ENDPOINT: {{ include "takos.s3Endpoint" . | quote }}
  AWS_S3_GIT_OBJECTS_BUCKET: {{ .Values.externalS3.gitObjectsBucket | default .Values.externalS3.bucket | default "takos-tenant-source" | quote }}
  AWS_S3_OFFLOAD_BUCKET: {{ .Values.externalS3.offloadBucket | default .Values.externalS3.bucket | default "takos-tenant-source" | quote }}
  AWS_S3_TENANT_SOURCE_BUCKET: {{ .Values.externalS3.tenantSourceBucket | default .Values.externalS3.bucket | default "takos-tenant-source" | quote }}
  AWS_S3_WORKER_BUNDLES_BUCKET: {{ .Values.externalS3.workerBundlesBucket | default .Values.externalS3.bucket | default "takos-tenant-source" | quote }}
  AWS_S3_TENANT_BUILDS_BUCKET: {{ .Values.externalS3.tenantBuildsBucket | default .Values.externalS3.bucket | default "takos-tenant-source" | quote }}
  # runtime-service compatibility aliases (apps/runtime expects S3_*)
  S3_REGION: {{ .Values.externalS3.region | default "us-east-1" | quote }}
  S3_ENDPOINT: {{ include "takos.s3Endpoint" . | quote }}
  S3_BUCKET: {{ .Values.externalS3.tenantSourceBucket | default .Values.externalS3.bucket | default "takos-tenant-source" | quote }}
  OCI_ORCHESTRATOR_URL: {{ include "takos.ociOrchestratorUrl" . | quote }}
  TAKOS_LOCAL_DATA_DIR: "/var/lib/takos/control"
  NODE_ENV: "production"
