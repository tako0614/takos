apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-takos-git
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/service-id: takos-git
    app.kubernetes.io/component: takos-git
spec:
  replicas: {{ .Values.services.takosGit.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: takos-git
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        takos.io/service-id: takos-git
        app.kubernetes.io/component: takos-git
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: takos-git
          image: "{{ include "takos.image" (dict "root" . "image" .Values.images.takosGit) }}"
          imagePullPolicy: {{ .Values.images.takosGit.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.takosGit.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.services.takosGit.port | quote }}
            - name: TAKOS_GIT_SERVICE_ID
              value: "takos-git"
            - name: TAKOS_APP_INTERNAL_URL
              value: {{ include "takos.appUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
          livenessProbe:
            httpGet:
              path: {{ .Values.services.takosGit.healthPath | quote }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.services.takosGit.healthPath | quote }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.services.takosGit.resources | nindent 12 }}
