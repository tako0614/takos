apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-control-web
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.controlWeb.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: control-web
    {{- include "takos.selectorLabels" . | nindent 4 }}
