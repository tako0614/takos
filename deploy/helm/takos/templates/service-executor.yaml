apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-executor
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.executor.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: executor
    {{- include "takos.selectorLabels" . | nindent 4 }}
