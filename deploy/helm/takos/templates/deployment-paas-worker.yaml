apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-paas-worker
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/process-role: takosumi-worker
    app.kubernetes.io/component: paas-worker
spec:
  replicas: {{ .Values.paasWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: paas-worker
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        takos.io/process-role: takosumi-worker
        app.kubernetes.io/component: paas-worker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: paas-worker
          image: "{{ .Values.images.control.repository }}:{{ .Values.images.control.tag }}"
          imagePullPolicy: {{ .Values.images.control.pullPolicy }}
          command: ["deno", "task", "start"]
          env:
            - name: TAKOSUMI_PROCESS_ROLE
              value: "takosumi-worker"
            - name: TAKOSUMI_RUNTIME_AGENT_URL
              value: {{ include "takos.paasRuntimeAgentUrl" . | quote }}
            - name: TAKOSUMI_LOG_WORKER_URL
              value: {{ include "takos.paasLogWorkerUrl" . | quote }}
            - name: TAKOSUMI_WORKER_POLL_INTERVAL_MS
              value: {{ .Values.paasWorker.pollIntervalMs | quote }}
            - name: TAKOSUMI_WORKER_SCHEDULED_INTERVAL_MS
              value: {{ .Values.paasWorker.scheduledIntervalMs | quote }}
            - name: TAKOSUMI_WORKER_HEARTBEAT_FILE
              value: "/var/lib/takos/worker-heartbeat.json"
            - name: TAKOSUMI_WORKER_HEARTBEAT_TTL_MS
              value: {{ .Values.paasWorker.heartbeatTtlMs | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.auth | default (printf "%s-auth" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.llm | default (printf "%s-llm" (include "takos.fullname" .)) }}
                optional: true
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - |
                  const fs = require('fs');
                  const f = '/var/lib/takos/worker-heartbeat.json';
                  const stat = fs.statSync(f);
                  const age = Date.now() - new Date(stat.mtime).getTime();
                  if (age > {{ .Values.paasWorker.heartbeatTtlMs }}) process.exit(1);
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.paasWorker.resources | nindent 12 }}
          volumeMounts:
            - name: paas-data
              mountPath: /var/lib/takos
      volumes:
        - name: paas-data
          emptyDir: {}
