{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "takos.fullname" . }}-platform
  labels:
    {{- include "takos.labels" . | nindent 4 }}
type: Opaque
data:
  PLATFORM_PRIVATE_KEY: {{ .Values.secrets.platformPrivateKey | b64enc | quote }}
  PLATFORM_PUBLIC_KEY: {{ .Values.secrets.platformPublicKey | b64enc | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | b64enc | quote }}
  EXECUTOR_PROXY_SECRET: {{ .Values.secrets.executorProxySecret | b64enc | quote }}
  TAKOS_INTERNAL_API_SECRET: {{ .Values.secrets.internalApiSecret | b64enc | quote }}
  {{- if .Values.secrets.ociOrchestratorToken }}
  OCI_ORCHESTRATOR_TOKEN: {{ .Values.secrets.ociOrchestratorToken | b64enc | quote }}
  {{- end }}
{{- end }}
