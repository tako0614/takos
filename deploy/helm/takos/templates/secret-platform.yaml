{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "takos.fullname" . }}-platform
  labels:
    {{- include "takos.labels" . | nindent 4 }}
type: Opaque
data:
  PLATFORM_PRIVATE_KEY: {{ .Values.secrets.platformPrivateKey | b64enc | quote }}
  PLATFORM_PUBLIC_KEY: {{ .Values.secrets.platformPublicKey | b64enc | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | b64enc | quote }}
{{- end }}
