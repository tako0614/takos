apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-executor-host
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor-host
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.executorHost.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: executor-host
    {{- include "takos.selectorLabels" . | nindent 4 }}
