apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-takosumi
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/service-id: takosumi
    app.kubernetes.io/component: takosumi
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.takosumi.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: takosumi
    {{- include "takos.selectorLabels" . | nindent 4 }}
