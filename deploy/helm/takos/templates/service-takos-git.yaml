apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-takos-git
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/service-id: takos-git
    app.kubernetes.io/component: takos-git
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.takosGit.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: takos-git
    {{- include "takos.selectorLabels" . | nindent 4 }}
