apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-browser
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: browser
spec:
  {{- if not .Values.browser.autoscaling.enabled }}
  replicas: {{ .Values.browser.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: browser
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        app.kubernetes.io/component: browser
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: browser
          image: "{{ .Values.images.browser.repository }}:{{ .Values.images.browser.tag }}"
          imagePullPolicy: {{ .Values.images.browser.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /internal/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /internal/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.browser.resources | nindent 12 }}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
