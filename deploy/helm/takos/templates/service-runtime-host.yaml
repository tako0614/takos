apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-runtime-host
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime-host
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.runtimeHost.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: runtime-host
    {{- include "takos.selectorLabels" . | nindent 4 }}
