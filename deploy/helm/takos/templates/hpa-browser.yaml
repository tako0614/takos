{{- if .Values.browser.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "takos.fullname" . }}-browser
  labels:
    {{- include "takos.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "takos.fullname" . }}-browser
  minReplicas: {{ .Values.browser.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.browser.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.browser.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
