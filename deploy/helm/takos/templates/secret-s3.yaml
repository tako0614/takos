{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "takos.fullname" . }}-s3
  labels:
    {{- include "takos.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.minio.enabled }}
  AWS_ACCESS_KEY_ID: {{ .Values.minio.auth.rootUser | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.minio.auth.rootPassword | b64enc | quote }}
  {{- else }}
  AWS_ACCESS_KEY_ID: {{ .Values.externalS3.accessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.externalS3.secretAccessKey | b64enc | quote }}
  {{- end }}
{{- end }}
