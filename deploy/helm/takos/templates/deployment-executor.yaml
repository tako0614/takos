apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-executor
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  {{- if not .Values.executor.autoscaling.enabled }}
  replicas: {{ .Values.executor.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: executor
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        app.kubernetes.io/component: executor
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: executor
          image: "{{ .Values.images.executor.repository }}:{{ .Values.images.executor.tag }}"
          imagePullPolicy: {{ .Values.images.executor.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: PROXY_BASE_URL
              value: {{ include "takos.executorHostUrl" . | quote }}
            - name: CONTROL_RPC_BASE_URL
              value: {{ include "takos.executorHostUrl" . | quote }}
            - name: TAKOS_ALLOW_NO_LLM
              value: "1"
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.llm | default (printf "%s-llm" (include "takos.fullname" .)) }}
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.executor.resources | nindent 12 }}
