apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-control-web
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-web
spec:
  replicas: {{ .Values.controlWeb.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: control-web
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        app.kubernetes.io/component: control-web
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-web
          image: "{{ .Values.images.control.repository }}:{{ .Values.images.control.tag }}"
          imagePullPolicy: {{ .Values.images.control.pullPolicy }}
          command: ["pnpm", "local:web"]
          ports:
            - name: http
              containerPort: {{ .Values.controlWeb.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.controlWeb.port | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.database | default (printf "%s-database" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.redis | default (printf "%s-redis" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.s3 | default (printf "%s-s3" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.auth | default (printf "%s-auth" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.llm | default (printf "%s-llm" (include "takos.fullname" .)) }}
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.controlWeb.resources | nindent 12 }}
          volumeMounts:
            - name: control-data
              mountPath: /var/lib/takos/control
      volumes:
        - name: control-data
          emptyDir: {}
