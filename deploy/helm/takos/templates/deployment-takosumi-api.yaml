apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-takosumi-api
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/process-role: takosumi-api
    app.kubernetes.io/component: takosumi-api
spec:
  replicas: {{ .Values.paasApi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: takosumi-api
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        takos.io/process-role: takosumi-api
        app.kubernetes.io/component: takosumi-api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: takosumi-api
          image: "{{ .Values.images.control.repository }}:{{ .Values.images.control.tag }}"
          imagePullPolicy: {{ .Values.images.control.pullPolicy }}
          command: ["deno", "task", "start"]
          ports:
            - name: http
              containerPort: {{ .Values.paasApi.port }}
              protocol: TCP
          env:
            - name: TAKOSUMI_PROCESS_ROLE
              value: "takosumi-api"
            - name: PORT
              value: {{ .Values.paasApi.port | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.auth | default (printf "%s-auth" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.llm | default (printf "%s-llm" (include "takos.fullname" .)) }}
                optional: true
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.paasApi.resources | nindent 12 }}
          volumeMounts:
            - name: control-data
              mountPath: /var/lib/takos/control
      volumes:
        - name: control-data
          emptyDir: {}
