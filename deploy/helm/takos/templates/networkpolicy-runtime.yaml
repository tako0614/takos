{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "takos.fullname" . }}-runtime-egress
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: runtime
      {{- include "takos.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    {{- if .Values.networkPolicy.runtime.allowDns }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values:
                  - kube-dns
                  - coredns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: control-web
              {{- include "takos.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.controlWeb.port }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: runtime-host
              {{- include "takos.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.runtimeHost.port }}
    {{- with .Values.networkPolicy.runtime.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
