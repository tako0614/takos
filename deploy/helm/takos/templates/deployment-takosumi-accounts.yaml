apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-takosumi-accounts
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/service-id: takosumi-accounts
    app.kubernetes.io/component: takosumi-accounts
spec:
  replicas: {{ .Values.services.takosumiAccounts.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: takosumi-accounts
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        takos.io/service-id: takosumi-accounts
        app.kubernetes.io/component: takosumi-accounts
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.accounts.persistence.enabled .Values.accounts.persistence.runMigrations }}
      initContainers:
        - name: takosumi-migrate
          image: "{{ include "takos.image" (dict "root" . "image" .Values.images.takosumiAccounts) }}"
          imagePullPolicy: {{ .Values.images.takosumiAccounts.pullPolicy }}
          command:
            - run
            - --allow-net
            - --allow-env=TAKOSUMI_ACCOUNTS_DATABASE_URL
            - --allow-read=packages/accounts-service/migrations
            - packages/cli/src/main.ts
            - accounts
            - migrate
          env:
            - name: TAKOSUMI_ACCOUNTS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "takos.accountsDatabaseSecretName" . | quote }}
                  key: {{ .Values.accounts.persistence.databaseUrlSecretKey | quote }}
          resources:
            {{- toYaml .Values.services.takosumiAccounts.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: takosumi-accounts
          image: "{{ include "takos.image" (dict "root" . "image" .Values.images.takosumiAccounts) }}"
          imagePullPolicy: {{ .Values.images.takosumiAccounts.pullPolicy }}
          command:
            - run
            - --allow-net
            - --allow-env=TAKOSUMI_ACCOUNTS_DATABASE_URL
            - packages/cli/src/main.ts
            - accounts
            - serve
            - --hostname
            - 0.0.0.0
            - --port
            - {{ .Values.services.takosumiAccounts.port | quote }}
            - --issuer
            - {{ include "takos.accountsIssuer" . | quote }}
            - --subject
            - {{ .Values.accounts.subject | quote }}
            - --client-id
            - {{ .Values.accounts.clientId | quote }}
            - --redirect-uri
            - {{ include "takos.oidcRedirectUri" . | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.services.takosumiAccounts.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.services.takosumiAccounts.port | quote }}
            - name: TAKOSUMI_ACCOUNTS_SERVICE_ID
              value: "takosumi-accounts"
            {{- if .Values.accounts.persistence.enabled }}
            - name: TAKOSUMI_ACCOUNTS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "takos.accountsDatabaseSecretName" . | quote }}
                  key: {{ .Values.accounts.persistence.databaseUrlSecretKey | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.auth | default (printf "%s-auth" (include "takos.fullname" .)) }}
          livenessProbe:
            httpGet:
              path: {{ .Values.services.takosumiAccounts.healthPath | quote }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.services.takosumiAccounts.healthPath | quote }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.services.takosumiAccounts.resources | nindent 12 }}
