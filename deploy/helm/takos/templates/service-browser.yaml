apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-browser
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: browser
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.browser.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: browser
    {{- include "takos.selectorLabels" . | nindent 4 }}
