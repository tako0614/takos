apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-executor-host
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor-host
spec:
  replicas: {{ .Values.executorHost.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: executor-host
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        app.kubernetes.io/component: executor-host
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: executor-host
          image: "{{ .Values.images.control.repository }}:{{ .Values.images.control.tag }}"
          imagePullPolicy: {{ .Values.images.control.pullPolicy }}
          command: ["deno", "task", "dev:local:executor-host"]
          ports:
            - name: http
              containerPort: {{ .Values.executorHost.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.executorHost.port | quote }}
            - name: PROXY_BASE_URL
              value: {{ include "takos.executorHostUrl" . | quote }}
            - name: CONTROL_RPC_BASE_URL
              value: {{ include "takos.executorHostUrl" . | quote }}
            - name: TAKOS_LOCAL_RUNTIME_HOST_URL
              value: {{ include "takos.runtimeHostUrl" . | quote }}
            - name: TAKOS_LOCAL_EXECUTOR_URL
              value: {{ include "takos.executorUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.database | default (printf "%s-database" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.redis | default (printf "%s-redis" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.s3 | default (printf "%s-s3" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.auth | default (printf "%s-auth" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.llm | default (printf "%s-llm" (include "takos.fullname" .)) }}
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.executorHost.resources | nindent 12 }}
