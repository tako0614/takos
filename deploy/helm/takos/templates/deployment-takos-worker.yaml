apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "takos.fullname" . }}-takos-worker
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/service-id: takos-worker
    app.kubernetes.io/component: takos-worker
spec:
  replicas: {{ .Values.services.takosWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: takos-worker
      {{- include "takos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "takos.labels" . | nindent 8 }}
        takos.io/service-id: takos-worker
        app.kubernetes.io/component: takos-worker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: takos-worker
          image: "{{ include "takos.image" (dict "root" . "image" .Values.images.takosWorker) }}"
          imagePullPolicy: {{ .Values.images.takosWorker.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.takosWorker.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.services.takosWorker.port | quote }}
            - name: TAKOS_WORKER_SERVICE_ID
              value: "takos-worker"
            - name: TAKOSUMI_INTERNAL_URL
              value: {{ include "takos.takosumiUrl" . | quote }}
            - name: TAKOS_GIT_INTERNAL_URL
              value: {{ include "takos.gitUrl" . | quote }}
            - name: TAKOS_AGENT_INTERNAL_URL
              value: {{ include "takos.agentUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "takos.fullname" . }}-global
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.platform | default (printf "%s-platform" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.auth | default (printf "%s-auth" (include "takos.fullname" .)) }}
            - secretRef:
                name: {{ .Values.secrets.existingSecrets.llm | default (printf "%s-llm" (include "takos.fullname" .)) }}
                optional: true
          livenessProbe:
            httpGet:
              path: {{ .Values.services.takosWorker.healthPath | quote }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.services.takosWorker.healthPath | quote }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.services.takosWorker.resources | nindent 12 }}
