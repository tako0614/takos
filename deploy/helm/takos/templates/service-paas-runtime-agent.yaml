apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-paas-runtime-agent
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/process-role: takosumi-runtime-agent
    app.kubernetes.io/component: paas-runtime-agent
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.paasRuntimeAgent.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: paas-runtime-agent
    {{- include "takos.selectorLabels" . | nindent 4 }}
