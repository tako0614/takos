apiVersion: v1
kind: Service
metadata:
  name: {{ include "takos.fullname" . }}-paas-api
  labels:
    {{- include "takos.labels" . | nindent 4 }}
    takos.io/process-role: takosumi-api
    app.kubernetes.io/component: paas-api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.paasApi.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: paas-api
    {{- include "takos.selectorLabels" . | nindent 4 }}
