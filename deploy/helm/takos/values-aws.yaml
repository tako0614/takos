# AWS production overlay
# Usage: helm install takos . -f values.yaml -f values-aws.yaml

# Disable bundled infrastructure (use AWS managed services)
postgresql:
  enabled: false
redis:
  enabled: false
minio:
  enabled: false

# AWS RDS PostgreSQL
externalDatabase:
  url: ""  # Set via --set or external secret: postgresql://user:pass@rds-endpoint:5432/takos

# AWS ElastiCache Redis
externalRedis:
  url: ""  # Set via --set or external secret: redis://elasticache-endpoint:6379

# AWS S3
externalS3:
  endpoint: "https://s3.amazonaws.com"
  region: "ap-northeast-1"
  bucket: "takos-tenant-source"
  accessKeyId: ""      # Use IAM roles for EKS instead
  secretAccessKey: ""

# Production domains
domains:
  admin: "admin.takos.example.com"
  tenantBase: "app.takos.example.com"

# Use existing secrets managed by External Secrets Operator or sealed-secrets
secrets:
  create: false
  existingSecrets:
    platform: "takos-platform-secret"
    auth: "takos-auth-secret"
    encryption: "takos-platform-secret"
    llm: "takos-llm-secret"
    database: "takos-database-secret"
    redis: "takos-redis-secret"
    s3: "takos-s3-secret"

# AWS ALB Ingress
ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: ""  # Set to ACM certificate ARN
  tls:
    enabled: false  # ALB handles TLS termination via ACM

# Production resource tuning
controlWeb:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

controlDispatch:
  replicaCount: 3

controlWorker:
  replicaCount: 2

runtime:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20

executor:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20

browser:
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10

# EKS service account for IAM roles (IRSA)
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""  # Set to IAM role ARN
