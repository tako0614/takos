# AWS fail-closed overlay template.
# This file is not a complete production profile by itself: every empty
# runtimeConfig.plugins entry must be replaced by a trusted, non-reference
# kernel plugin id supplied by the operator/plugin bundle.
# Usage: helm install takos . -f values.yaml -f values-aws.yaml

runtimeConfig:
  environment: production
  # Empty plugin ids intentionally fail runtime config validation. Override all
  # ports with non-reference plugins; do not inject DATABASE_URL/REDIS_URL/S3
  # backend credentials directly into PaaS control pods.
  plugins:
    auth: ""
    notification: ""
    operator-config: ""
    storage: ""
    source: ""
    provider: ""
    queue: ""
    object-storage: ""
    kms: ""
    secret-store: ""
    router-config: ""
    observability: ""
    runtime-agent: ""

# AWS managed-service connection details belong to the selected external
# plugin bundle/operator config. This product chart does not inject database,
# Redis, or S3 credentials directly into service pods.

# Production domains
domains:
  admin: "admin.takos.example.com"
  tenantBase: "app.takos.example.com"

# Empty values keep the chart default secret names derived from the Helm release:
# <release>-platform, <release>-auth, <release>-llm. Set a field only when an
# external secret uses a different name.
secrets:
  create: false
  existingSecrets:
    platform: ""
    auth: ""
    llm: ""

# AWS ALB Ingress
ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "" # Set to ACM certificate ARN
  tls:
    enabled: false # ALB handles TLS termination via ACM

# Production resource tuning
services:
  takosApp:
    replicaCount: 3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
  takosumi:
    replicaCount: 3
  takosGit:
    replicaCount: 2
  takosAgent:
    replicaCount: 2

# EKS service account for IAM roles (IRSA)
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "" # Set to IAM role ARN
