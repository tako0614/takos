## -----------------------------------------------------------------
## Global settings
## -----------------------------------------------------------------
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

## -----------------------------------------------------------------
## Domain configuration
## -----------------------------------------------------------------
domains:
  admin: "admin.takos.example.com"
  tenantBase: "app.takos.example.com"
  accounts: "accounts.takos.example.com"

## -----------------------------------------------------------------
## Container images
## -----------------------------------------------------------------
images:
  takosApp:
    registry: ghcr.io
    repository: takos/takos-app
    tag: ""  # Set by CI release pipeline. Do not use "latest" in production.
    pullPolicy: IfNotPresent
  takosumi:
    registry: ghcr.io
    repository: takos/takosumi
    tag: ""  # Set by CI release pipeline. Do not use "latest" in production.
    pullPolicy: IfNotPresent
  takosumiCloud:
    registry: ghcr.io
    repository: takos/takosumi-cloud-accounts
    tag: ""  # Set by CI release pipeline. Do not use "latest" in production.
    pullPolicy: IfNotPresent
  takosGit:
    registry: ghcr.io
    repository: takos/takos-git
    tag: ""  # Set by CI release pipeline. Do not use "latest" in production.
    pullPolicy: IfNotPresent
  takosAgent:
    registry: ghcr.io
    repository: takos/takos-agent
    tag: ""  # Set by CI release pipeline. Do not use "latest" in production.
    pullPolicy: IfNotPresent

## -----------------------------------------------------------------
## Runtime configuration
## -----------------------------------------------------------------
## These bundled values are local/reference defaults. Staging/production
## overlays must replace every plugin id with trusted non-reference selections.
runtimeConfig:
  environment: local
  publicRoutesEnabled: false
  allowUnsafeProductionDefaults: false
  managedResources: {}
  defaultAppDistributionJson: ""
  defaultApps:
    preinstallEnabled: false
    installUrl: ""
    installAccountId: ""
    installSubject: ""
    installMode: ""
    installRuntimeBaseUrl: ""
  plugins:
    auth: takos.kernel.reference
    notification: takos.kernel.reference
    operator-config: takos.kernel.reference
    storage: takos.kernel.reference
    source: takos.kernel.reference
    provider: takos.kernel.reference
    queue: takos.kernel.reference
    object-storage: takos.kernel.reference
    kms: takos.kernel.reference
    secret-store: takos.kernel.reference
    router-config: takos.kernel.reference
    observability: takos.kernel.reference
    runtime-agent: takos.kernel.reference

## -----------------------------------------------------------------
## Runtime stack workloads
## -----------------------------------------------------------------
services:
  takosApp:
    replicaCount: 2
    port: 8080
    healthPath: /health
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

  takosumi:
    replicaCount: 2
    port: 8080
    healthPath: /health
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2
        memory: 2Gi

  takosumiCloud:
    replicaCount: 1
    port: 8787
    healthPath: /healthz
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

  takosGit:
    replicaCount: 1
    port: 8790
    healthPath: /health
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

  takosAgent:
    replicaCount: 1
    port: 8080
    healthPath: /health
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi

## -----------------------------------------------------------------
## Secrets
## -----------------------------------------------------------------
secrets:
  create: true

  ## Use existing secrets instead of creating new ones.
  ## When set, the chart will reference these secret names directly.
  existingSecrets:
    platform: ""
    auth: ""
    llm: ""

  ## Values used when secrets.create is true.
  ## In production, use existingSecrets or an external secrets operator.
  platformPrivateKey: ""
  platformPublicKey: ""
  encryptionKey: ""
  executorProxySecret: ""
  internalApiSecret: ""
  accountsDatabaseUrl: ""
  defaultAppInstallToken: ""
  googleClientId: ""
  googleClientSecret: ""
  oidcClientSecret: ""
  openaiApiKey: ""
  anthropicApiKey: ""
  googleApiKey: ""

## -----------------------------------------------------------------
## Takosumi Accounts bootstrap
## -----------------------------------------------------------------
accounts:
  issuer: ""
  subject: "tsub_takos_admin"
  clientId: "takos-private-production"
  redirectUri: ""
  persistence:
    enabled: false
    runMigrations: false
    databaseUrlSecretName: ""
    databaseUrlSecretKey: "TAKOSUMI_ACCOUNTS_DATABASE_URL"

## -----------------------------------------------------------------
## Ingress
## -----------------------------------------------------------------
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  gcpManagedCertificate:
    enabled: false
    name: ""
    domains: []
  tls:
    enabled: true
    secretName: "takos-tls"
    clusterIssuer: ""

## -----------------------------------------------------------------
## Service Account
## -----------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

## -----------------------------------------------------------------
## Pod Security Context
## -----------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
