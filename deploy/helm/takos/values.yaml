## -----------------------------------------------------------------
## Global settings
## -----------------------------------------------------------------
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

## -----------------------------------------------------------------
## Domain configuration
## -----------------------------------------------------------------
domains:
  admin: "admin.takos.example.com"
  tenantBase: "app.takos.example.com"

## -----------------------------------------------------------------
## Container images
## -----------------------------------------------------------------
images:
  control:
    repository: takos/control
    tag: "latest"
    pullPolicy: IfNotPresent
  runtime:
    repository: takos/runtime
    tag: "latest"
    pullPolicy: IfNotPresent
  executor:
    repository: takos/executor
    tag: "latest"
    pullPolicy: IfNotPresent

## -----------------------------------------------------------------
## Control plane - Web (HTTP API)
## Port defaults: canonical source is DEFAULT_LOCAL_PORTS in
## packages/control/src/local-platform/runtime-types.ts
## -----------------------------------------------------------------
controlWeb:
  replicaCount: 2
  port: 8787
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

## -----------------------------------------------------------------
## Control plane - Dispatch
## -----------------------------------------------------------------
controlDispatch:
  replicaCount: 2
  port: 8788
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## -----------------------------------------------------------------
## Control plane - Worker
## -----------------------------------------------------------------
controlWorker:
  replicaCount: 1
  pollIntervalMs: 250
  scheduledIntervalMs: 60000
  heartbeatTtlMs: 120000
  cronJob:
    enabled: false
    schedule: "*/15 * * * *"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

## -----------------------------------------------------------------
## Runtime host (manages runtime pods)
## -----------------------------------------------------------------
runtimeHost:
  replicaCount: 1
  port: 8789
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## -----------------------------------------------------------------
## Executor host (manages executor pods)
## -----------------------------------------------------------------
executorHost:
  replicaCount: 1
  port: 8790
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## -----------------------------------------------------------------
## OCI Orchestrator
## -----------------------------------------------------------------
ociOrchestrator:
  replicaCount: 1
  port: 9002
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 1Gi

## -----------------------------------------------------------------
## Runtime (agent runtime workloads)
## Keep this at a single replica unless sessions/jobs/workspaces are moved
## to sticky or external storage; runtime keeps state in memory.
## -----------------------------------------------------------------
runtime:
  replicaCount: 1
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

## -----------------------------------------------------------------
## Executor (code execution workloads)
## -----------------------------------------------------------------
executor:
  replicaCount: 1
  port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

## -----------------------------------------------------------------
## Secrets
## -----------------------------------------------------------------
secrets:
  create: true

  ## Use existing secrets instead of creating new ones.
  ## When set, the chart will reference these secret names directly.
  existingSecrets:
    platform: ""
    auth: ""
    llm: ""
    database: ""
    redis: ""
    s3: ""

  ## Values used when secrets.create is true.
  ## In production, use existingSecrets or an external secrets operator.
  platformPrivateKey: ""
  platformPublicKey: ""
  encryptionKey: ""
  executorProxySecret: ""
  internalApiSecret: ""
  googleClientId: ""
  googleClientSecret: ""
  openaiApiKey: ""
  anthropicApiKey: ""
  googleApiKey: ""
  ociOrchestratorToken: ""

## -----------------------------------------------------------------
## External database (used when postgresql.enabled is false)
## -----------------------------------------------------------------
externalDatabase:
  host: ""
  port: 5432
  database: "takos"
  username: "takos"
  password: ""
  url: ""

## -----------------------------------------------------------------
## External Redis (used when redis.enabled is false)
## -----------------------------------------------------------------
externalRedis:
  host: ""
  port: 6379
  password: ""
  url: ""

## -----------------------------------------------------------------
## External S3 (used when minio.enabled is false)
## -----------------------------------------------------------------
externalS3:
  endpoint: ""
  region: "us-east-1"
  bucket: "takos-tenant-source"
  gitObjectsBucket: ""
  offloadBucket: ""
  tenantSourceBucket: ""
  workerBundlesBucket: ""
  tenantBuildsBucket: ""
  accessKeyId: ""
  secretAccessKey: ""

## -----------------------------------------------------------------
## Bitnami PostgreSQL subchart
## -----------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: takos
    ## MUST be overridden in production (e.g. via --set or a secrets operator)
    password: ""
    database: takos
  primary:
    persistence:
      size: 10Gi

## -----------------------------------------------------------------
## Bitnami Redis subchart
## -----------------------------------------------------------------
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi

## -----------------------------------------------------------------
## Bitnami MinIO subchart
## -----------------------------------------------------------------
minio:
  enabled: true
  auth:
    rootUser: takos
    ## MUST be overridden in production (e.g. via --set or a secrets operator)
    rootPassword: ""
  defaultBuckets: "takos-tenant-source"
  persistence:
    size: 10Gi

## -----------------------------------------------------------------
## Ingress
## -----------------------------------------------------------------
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  gcpManagedCertificate:
    enabled: false
    name: ""
    domains: []
  tls:
    enabled: true
    secretName: "takos-tls"
    clusterIssuer: ""

## -----------------------------------------------------------------
## Service Account
## -----------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

## -----------------------------------------------------------------
## Pod Security Context
## -----------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

## -----------------------------------------------------------------
## Network Policy
## Runtime executes user-controlled commands, so egress is restricted by
## default. Add explicit runtime.extraEgress peers for cluster-specific
## dependencies such as private Git mirrors. When minio.enabled is true, the
## runtime policy includes bundled MinIO egress automatically. When using
## externalS3, add runtime.extraEgress entries for the object storage path
## required by your cluster/CNI.
## -----------------------------------------------------------------
networkPolicy:
  enabled: true
  runtime:
    allowDns: true
    extraEgress: []
