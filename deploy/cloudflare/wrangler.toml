[[env.staging.queues.producers]]
queue = "takos-index-jobs-staging"
binding = "INDEX_QUEUE"

[[env.staging.queues.producers]]
queue = "takos-workflow-jobs-staging"
binding = "WORKFLOW_QUEUE"

[[env.staging.queues.producers]]
queue = "takos-deployment-jobs-staging"
binding = "DEPLOY_QUEUE"

# The embedded Takosumi deploy-control plane intentionally has no queue binding
# in the self-host staging worker. See the production note.

[[env.staging.queues.consumers]]
queue = "takos-runs-staging"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-runs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-runs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.queues.consumers]]
queue = "takos-index-jobs-staging"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 2
dead_letter_queue = "takos-index-jobs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-index-jobs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.queues.consumers]]
queue = "takos-workflow-jobs-staging"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-workflow-jobs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-workflow-jobs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.queues.consumers]]
queue = "takos-deployment-jobs-staging"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-deployment-jobs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-deployment-jobs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "takos-embeddings-staging"

[env.staging.ai]
binding = "AI"

[[env.staging.services]]
binding = "TAKOS_EGRESS"
service = "takos-staging"
