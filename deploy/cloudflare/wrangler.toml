max_instances = 10

# Deploy-control OpenTofu run executor (staging). Paths mirror production.
[[env.staging.containers]]
class_name = "TakosumiOpenTofuRunner"
image = "../../../takosumi/deploy/cloudflare/runner/Dockerfile"
image_build_context = "../../../takosumi/deploy/cloudflare"
instance_type = "basic"
max_instances = 5

[[env.staging.r2_buckets]]
binding = "WORKER_BUNDLES"
bucket_name = "takos-worker-bundles-staging"

[[env.staging.r2_buckets]]
binding = "TENANT_BUILDS"
bucket_name = "takos-tenant-builds-staging"

[[env.staging.r2_buckets]]
binding = "TENANT_SOURCE"
bucket_name = "takos-tenant-source-staging"

[[env.staging.r2_buckets]]
binding = "GIT_OBJECTS"
bucket_name = "takos-git-objects-staging"

[[env.staging.r2_buckets]]
binding = "TAKOS_OFFLOAD"
bucket_name = "takos-offload-staging"

[[env.staging.queues.producers]]
queue = "takos-runs-staging"
binding = "RUN_QUEUE"

[[env.staging.queues.producers]]
queue = "takos-index-jobs-staging"
binding = "INDEX_QUEUE"

[[env.staging.queues.producers]]
queue = "takos-workflow-jobs-staging"
binding = "WORKFLOW_QUEUE"

[[env.staging.queues.producers]]
queue = "takos-deployment-jobs-staging"
binding = "DEPLOY_QUEUE"

# Deploy-control plane queues (staging). Producer-only; see the production note —
# the in-process runner adapter dispatches synchronously to the container DO.
[[env.staging.queues.producers]]
queue = "takos-control-plane-staging"
binding = "TAKOS_QUEUE"

[[env.staging.queues.producers]]
queue = "takos-opentofu-runs-staging"
binding = "TAKOS_OPENTOFU_RUN_QUEUE"

[[env.staging.queues.consumers]]
queue = "takos-runs-staging"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-runs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-runs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.queues.consumers]]
queue = "takos-index-jobs-staging"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 2
dead_letter_queue = "takos-index-jobs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-index-jobs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.queues.consumers]]
queue = "takos-workflow-jobs-staging"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-workflow-jobs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-workflow-jobs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.queues.consumers]]
queue = "takos-deployment-jobs-staging"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-deployment-jobs-dlq-staging"

[[env.staging.queues.consumers]]
queue = "takos-deployment-jobs-dlq-staging"
max_batch_size = 10
max_batch_timeout = 60

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "takos-embeddings-staging"

[env.staging.ai]
binding = "AI"

[[env.staging.services]]
binding = "TAKOS_EGRESS"
service = "takos-staging"
