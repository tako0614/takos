## OSS-safe deployment template.
## Replace placeholder domains, account IDs, namespace IDs, and resource IDs
## before deploying.
##
## SOURCE OF TRUTH: Takos is the first-party AI Workspace distribution on
## Takosumi. The OpenTofu module at ../opentofu (var.target = cloudflare)
## provisions the DURABLE infra for the Takos distribution worker and publishes
## the non-secret endpoints / binding map. This wrangler.toml is the
## WORKER-ARTIFACT HALF of that same Takosumi-native deploy: the worker script
## entry, ASSETS, container images, Durable Object migrations, routes, and binding
## wiring the OpenTofu provider cannot express. It reads the module outputs and
## must stay in sync with the module; it is not a competing source of truth for
## durable infra or a product-only deploy authority.
## See ../../docs/architecture/internal-trust-boundaries.md for the deploy invariant.

# NOTE: all relative paths in this file resolve from THIS config file's
# directory (takos/deploy/cloudflare/), per wrangler semantics.
name = "takos"
main = "../../src/worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat", "no_handle_cross_request_promise_resolution"]

# Single public hostname for the self-hosted Takos product worker (Takos product
# + in-process embedded accounts plane at the origin root + in-process
# deploy-control). The self-hoster sets THEIR OWN hostname here; this worker is
# its own OIDC issuer at that origin. (app.takosumi.com is the operator's
# Takosumi platform worker — a separate build target — not this product worker.)
# custom_domain provisions the DNS record + TLS cert automatically on deploy.
# [[routes]]
# pattern = "app.your-domain.example"
# custom_domain = true

[observability]
enabled = true

[observability.logs]
head_sampling_rate = 0.1

[vars]
# Non-sensitive configuration only. Replace the example.* placeholders with the
# self-hoster's own hostname.
ADMIN_DOMAIN = "app.your-domain.example"
TENANT_BASE_DOMAIN = "app.your-domain.example"
AUTH_PUBLIC_BASE_URL = "https://app.your-domain.example"
PROXY_BASE_URL = "https://app.your-domain.example"
TAKOS_AGENT_CONTROL_RPC_BASE_URL = "https://app.your-domain.example"
# Remote-tool allowlist for the agent runtime. The agent container fails closed
# when this is empty, so the bundled distribution defaults to "*" (all
# first-party tools: file read/write, runtime exec, web fetch, repo ops). Narrow
# it to a comma-separated list (e.g. "file_read,web_fetch") to restrict which
# tools the agent may call. Leave unset to keep the all-tools default.
# TAKOS_AGENT_TOOL_ALLOWLIST = "*"
# OIDC redirect/return-to targets are validated from server-managed config:
# redirect_uri is checked against the per-client redirectUris allowlist
# (auth/oidc.ts) and return_to is constrained by sanitizeReturnTo
# (auth/provisioning.ts). No separate domain-allowlist env var is consumed.
# Root-unified single app: the embedded account plane runs in-process and this
# self-hosted Takos worker is its OWN OIDC issuer at the bare origin (no /accounts
# suffix). The accounts handler derives all discovery + OIDC endpoints from the
# issuer, so these put discovery and the OAuth endpoints at the root.
# self-host: this instance's own origin (the embedded accounts plane is the issuer).
TAKOSUMI_ACCOUNTS_ISSUER = "https://app.your-domain.example"
OIDC_ISSUER_URL = "https://app.your-domain.example"
OIDC_CLIENT_ID = "takos-worker-installation-client"
OIDC_REDIRECT_URI = "https://app.your-domain.example/auth/oidc/callback"
# Account-plane (in-process embedded Accounts handler) non-secret config. The
# handler reads these directly from env (handler.ts); var names mirror
# takosumi/deploy/accounts-cloudflare/wrangler.toml. Secrets are pushed via
# `wrangler secret put` (see the secrets block below), never committed here.
TAKOSUMI_ACCOUNTS_SUBJECT = "tsub_replace_with_subject"
TAKOSUMI_ACCOUNTS_CLIENT_ID = "takos-selfhost-installation-client"
# self-host: this instance's own origin (the embedded accounts plane is the issuer).
TAKOSUMI_ACCOUNTS_REDIRECT_URIS = "https://app.your-domain.example/auth/oidc/callback"
TAKOSUMI_ACCOUNTS_PLATFORM_ACCESS = "closed"
TAKOSUMI_ACCOUNTS_EXPORT_DOWNLOAD_TTL_MS = "86400000"
# OCI deployment adapter for image-backed services / containers.
OCI_ORCHESTRATOR_URL = ""
CF_ACCOUNT_ID = "replace-with-account-id"
CF_ZONE_ID = "replace-with-zone-id"

[triggers]
crons = ["3,18,33,48 * * * *", "5 * * * *"]

# IMPORTANT: The following sensitive values must be set via `wrangler secret put`:
# - OIDC_CLIENT_SECRET: Takosumi Accounts OIDC client secret (required)
# Static assets (routed through Worker for hostname-based routing)
[assets]
directory = "../../dist"
binding = "ASSETS"
run_worker_first = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "takos-control-db"
database_id = "replace-with-d1-database-id"
migrations_dir = "../../db/migrations-control/migrations"

# Account-plane D1 (in-process embedded Accounts handler). Separate D1 from the
# product `DB`: the schemas are namespace-incompatible (accounts = document-store
# buckets; product = relational tables), so they stay as two bindings in this one
# worker. No migrations_dir: the accounts schema is applied by the accounts
# `migrate-d1` runner and the in-process handler fail-closes on schema-version
# drift (handler.ts ensureD1SchemaVersion). Create your own with
# `wrangler d1 create takos-accounts` and fill the id.
[[d1_databases]]
binding = "TAKOSUMI_ACCOUNTS_DB"
database_name = "takos-accounts"
database_id = "replace-with-accounts-d1-database-id"

# Account-plane R2 (metadata-only Installation export download artifacts served
# from `/__takosumi/exports/*`). Create your own with
# `wrangler r2 bucket create takos-accounts-exports`.
[[r2_buckets]]
binding = "TAKOSUMI_ACCOUNTS_EXPORTS"
bucket_name = "takos-accounts-exports"

# Deploy-control D1 (in-process embedded deploy-control plane). Separate DB from
# the product `DB` and from `TAKOSUMI_ACCOUNTS_DB`: the OpenTofu run ledger has
# its own schema. No migrations_dir — d1_opentofu_store.ts + d1_deploy_stores.ts
# self-create their namespaced key/value + run tables lazily. Create with
# `wrangler d1 create takos-deploy`. Binding name is read verbatim by the
# Takosumi deploy handler (bindings.ts TAKOSUMI_CONTROL_DB).
[[d1_databases]]
binding = "TAKOSUMI_CONTROL_DB"
database_name = "takos-deploy"
database_id = "replace-with-deploy-d1-database-id"

# Deploy-control R2 (OpenTofu plan artifacts). Default bucket name expected by
# opentofu_runner_container.ts (DEFAULT_PLAN_ARTIFACT_BUCKET = "takos-artifacts").
[[r2_buckets]]
binding = "R2_ARTIFACTS"
bucket_name = "takos-artifacts"

# KV for hostname routing
[[kv_namespaces]]
binding = "HOSTNAME_ROUTING"
id = "replace-with-hostname-routing-kv-namespace-id"

# KV for rollout health check (optional — enables canary error-rate gating).
# When unbound, advanceStage() skips health checks and proceeds unconditionally.
# See ../../src/worker/application/services/platform/rollout.ts:117-129
[[kv_namespaces]]
binding = "ROLLOUT_HEALTH_KV"
id = "replace-with-rollout-health-kv-namespace-id"

# Durable Objects
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

[[durable_objects.bindings]]
name = "RUN_NOTIFIER"
class_name = "RunNotifierDO"

[[durable_objects.bindings]]
name = "NOTIFICATION_NOTIFIER"
class_name = "NotificationNotifierDO"

# Distributed rate limiting (optional - falls back to in-memory if not configured)
[[durable_objects.bindings]]
name = "RATE_LIMITER_DO"
class_name = "RateLimiterDO"

[[durable_objects.bindings]]
name = "ROUTING_DO"
class_name = "RoutingDO"

[[durable_objects.bindings]]
name = "RUNTIME_CONTAINER"
class_name = "TakosRuntimeContainer"

[[durable_objects.bindings]]
name = "EXECUTOR_CONTAINER"
class_name = "ExecutorContainerTier1"

[[durable_objects.bindings]]
name = "EXECUTOR_CONTAINER_TIER2"
class_name = "ExecutorContainerTier2"

[[durable_objects.bindings]]
name = "EXECUTOR_CONTAINER_TIER3"
class_name = "ExecutorContainerTier3"

# Deploy-control Durable Objects (in-process Takosumi deploy-control plane).
# Binding names are read verbatim by the takosumi deploy handler (bindings.ts:
# COORDINATION, RUNNER). The class_name values must match
# the DO classes re-exported from src/worker/index.ts.
[[durable_objects.bindings]]
name = "COORDINATION"
class_name = "CoordinationObject"

[[durable_objects.bindings]]
name = "RUNNER"
class_name = "OpenTofuRunnerObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]

[[migrations]]
tag = "v2"
new_classes = ["RunNotifierDO"]

[[migrations]]
tag = "v3"
new_classes = ["RateLimiterDO"]

[[migrations]]
tag = "v4"
new_classes = ["NotificationNotifierDO"]

[[migrations]]
tag = "v5"
new_classes = ["RoutingDO"]

[[migrations]]
tag = "v6"
new_sqlite_classes = [
  "TakosRuntimeContainer",
  "ExecutorContainerTier1",
  "ExecutorContainerTier2",
  "ExecutorContainerTier3",
]

# Deploy-control Durable Objects — appended as the NEXT tags after takos v6 (do
# NOT reuse the takosumi v1/v2 tags; renumbering corrupts existing DO migration
# state). Both DOs use SQLite storage (matches takosumi's new_sqlite_classes).
[[migrations]]
tag = "v7"
new_sqlite_classes = ["CoordinationObject"]

[[migrations]]
tag = "v8"
new_sqlite_classes = ["OpenTofuRunnerObject"]

# Runtime / executor images build from this repo's Dockerfiles. image /
# image_build_context are wrangler-config-relative (resolved from
# takos/deploy/cloudflare). Before deploying, build each container's dist/ so
# the image COPY succeeds: run `bun build.mjs` in containers/runtime and
# containers/executor (or `bun run build` in each dir).
[[containers]]
class_name = "TakosRuntimeContainer"
image = "../../containers/runtime/Dockerfile"
image_build_context = "../../containers/runtime"
instance_type = "standard-2"
max_instances = 25

[[containers]]
class_name = "ExecutorContainerTier1"
image = "../../containers/executor/Dockerfile"
image_build_context = "../../containers/executor"
instance_type = "lite"
max_instances = 20

[[containers]]
class_name = "ExecutorContainerTier2"
image = "../../containers/executor/Dockerfile"
image_build_context = "../../containers/executor"
instance_type = "basic"
max_instances = 200

[[containers]]
class_name = "ExecutorContainerTier3"
image = "../../containers/executor/Dockerfile"
image_build_context = "../../containers/executor"
instance_type = { vcpu = 1, memory_mib = 12288, disk_mb = 4000 }
max_instances = 25

# Deploy-control OpenTofu run executor (in-process Takosumi deploy-control
# plane). The embedded deploy service drives this container-backed DO through its
# OpenTofu runner adapter. Paths are takosumi-relative;
# rewritten here; build context = takosumi repo root (the runner Dockerfile
[[containers]]
class_name = "OpenTofuRunnerObject"
image = "../../../takosumi/runner/Dockerfile"
image_build_context = "../../../takosumi"
instance_type = "basic"
max_instances = 10

# R2 Bucket for worker bundles (optional - for production)
[[r2_buckets]]
binding = "WORKER_BUNDLES"
bucket_name = "takos-worker-bundles"

# R2 Bucket for tenant custom workers
[[r2_buckets]]
binding = "TENANT_BUILDS"
bucket_name = "takos-tenant-builds"

# R2 Bucket for tenant source code
[[r2_buckets]]
binding = "TENANT_SOURCE"
bucket_name = "takos-tenant-source"

# R2 Bucket for Git store objects (blobs, trees, commits)
[[r2_buckets]]
binding = "GIT_OBJECTS"
bucket_name = "takos-git-objects"

# R2 Bucket for offloading hot D1 bulk data (RunEvent JSONL, large Messages, Usage raw)
[[r2_buckets]]
binding = "TAKOS_OFFLOAD"
bucket_name = "takos-offload"

# Secrets (set via wrangler secret put):
# Authentication:
# - OIDC_CLIENT_SECRET: Takosumi Accounts OIDC client secret
#
# Platform keys:
# - PLATFORM_PRIVATE_KEY: Private key for signing platform tokens
# - PLATFORM_PUBLIC_KEY: Public key for verifying platform tokens
#   The same pair is used for runtime-service JWTs. The unified takos Worker
#   signs with PLATFORM_PRIVATE_KEY and injects PLATFORM_PUBLIC_KEY into the
#   runtime container as JWT_PUBLIC_KEY.
#
# Internal executor RPC:
# - EXECUTOR_PROXY_SECRET: Shared secret carried into the in-process executor
#   container host env. Container Control RPC is dispatched in-process after the
#   per-run proxy token + scope are verified (no service-binding hop).
#
# OCI deployment adapter:
# - OCI_ORCHESTRATOR_TOKEN: optional auth token for image-backed services /
#   containers when the orchestrator requires it.
#
# Cloudflare API:
# - CF_API_TOKEN: optional Cloudflare API token for Workers-for-Platforms
#   workload deployment when that backend is explicitly enabled.
#
# Account-plane (in-process Takosumi Accounts handler) secrets — var names
# mirror takosumi/deploy/accounts-cloudflare/wrangler.toml; push via
# `wrangler secret put`:
# - TAKOSUMI_ACCOUNTS_ES256_PRIVATE_JWK: ES256 private JWK for OIDC token signing
# - TAKOSUMI_ACCOUNTS_ES256_KEY_ID: optional kid for the signing key
# - TAKOSUMI_ACCOUNTS_OIDC_PAIRWISE_SUBJECT_SECRET: pairwise OIDC subject HMAC secret
# - TAKOSUMI_ACCOUNTS_LAUNCH_TOKEN_PAIRWISE_SECRET: launch-token pairwise HMAC secret
# - TAKOSUMI_ACCOUNTS_EXPORT_DOWNLOAD_SECRET: signs /__takosumi/exports/* download URLs
# Deploy-control plane (in-process Takosumi deploy-control handler) handshake —
# push via `wrangler secret put`:
# - TAKOSUMI_DEPLOY_CONTROL_TOKEN: REQUIRED to enable remote deploy-control
#   fallback routes when they are explicitly exposed. The normal self-host Takos
#   path uses the in-process typed operations seam, but this secret still gates
#   bearer-protected fallback/callback surfaces. Must ship in the same deploy as
#   the TAKOSUMI_CONTROL_DB binding.
# Optional account-plane integrations (push only when enabled):
# - TAKOSUMI_ACCOUNTS_STRIPE_SECRET_KEY / _STRIPE_WEBHOOK_SECRET: Stripe billing
# - TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_CLIENT_ID / _CLIENT_SECRET: upstream GitHub OAuth
# - TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_CLIENT_ID / _CLIENT_SECRET: upstream Google OAuth
# - TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_CLIENT_ID / _CLIENT_SECRET: upstream generic OIDC
# - TAKOSUMI_ACCOUNTS_PASSKEY_RP_ID / _PASSKEY_RP_NAME / _PASSKEY_ORIGIN: passkey auth

# Queue for agent run execution
[[queues.producers]]
queue = "takos-runs"
binding = "RUN_QUEUE"

# Queue for index jobs (embeddings, graph updates)
[[queues.producers]]
queue = "takos-index-jobs"
binding = "INDEX_QUEUE"

# Queue for workflow job execution (GitHub Actions-style workflows)
[[queues.producers]]
queue = "takos-workflow-jobs"
binding = "WORKFLOW_QUEUE"

# Queue for deployment job execution
[[queues.producers]]
queue = "takos-deployment-jobs"
binding = "DEPLOY_QUEUE"

# The embedded Takosumi deploy-control plane intentionally has no queue binding
# in the self-host Takos worker. `RUN_QUEUE` is owned by the Takos agent runtime;
# the Takosumi controller falls back to its inline dispatcher when its optional
# queue producer is absent and drives the RUNNER Durable Object directly.

[[queues.consumers]]
queue = "takos-runs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-runs-dlq"

[[queues.consumers]]
queue = "takos-runs-dlq"
max_batch_size = 10
max_batch_timeout = 60

[[queues.consumers]]
queue = "takos-index-jobs"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 2
dead_letter_queue = "takos-index-jobs-dlq"

[[queues.consumers]]
queue = "takos-index-jobs-dlq"
max_batch_size = 10
max_batch_timeout = 60

[[queues.consumers]]
queue = "takos-workflow-jobs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-workflow-jobs-dlq"

[[queues.consumers]]
queue = "takos-workflow-jobs-dlq"
max_batch_size = 10
max_batch_timeout = 60

[[queues.consumers]]
queue = "takos-deployment-jobs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 3
dead_letter_queue = "takos-deployment-jobs-dlq"

[[queues.consumers]]
queue = "takos-deployment-jobs-dlq"
max_batch_size = 10
max_batch_timeout = 60

# Vectorize for semantic search
[[vectorize]]
binding = "VECTORIZE"
index_name = "takos-embeddings"

# AI for embeddings
[ai]
binding = "AI"

# Internal service bindings
[[services]]
binding = "TAKOS_EGRESS"
service = "takos"

[env.staging]
name = "takos-staging"
workers_dev = true

[env.staging.vars]
