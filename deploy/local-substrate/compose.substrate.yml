# Phase 1 — Takos product full stack on top of Phase 0 ingress.
#
# Profiles:
#   postgres   takosumi kernel (Deno + Postgres + MinIO) + Accounts + takos product
#   workers    takosumi kernel (workerd / miniflare + D1 + R2-via-MinIO) + 同上 (Phase 1b で完成)
#
# Source mount + deno task pattern を採用 (image build 不要)。 production image
# でないのは「test bed」 のために意図的。 ファイル変更が即反映される。

services:
  # ---- 共通 storage / queue ----

  substrate-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takos
      POSTGRES_PASSWORD: takos
      POSTGRES_DB: takos_app
    volumes:
      - substrate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takos -d takos_app"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - postgres

  substrate-postgres-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      substrate-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: takos
    entrypoint:
      - /bin/sh
      - -c
      - |
        for db in takosumi takosumi_accounts takos_git; do
          psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname='$$db'" \
            | grep -q 1 \
            || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE $$db"
        done
    networks:
      - takos-local-internal

  substrate-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - substrate-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - redis

  substrate-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    volumes:
      - substrate-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/.minio.sys/format.json"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      takos-local-internal:
        aliases:
          - minio

  substrate-minio-init:
    image: minio/mc:latest
    depends_on:
      substrate-minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set takos http://minio:9000 \
          "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb --ignore-existing takos/takosumi
        mc mb --ignore-existing takos/takos-app
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    networks:
      - takos-local-internal

  # ---- Takosumi Accounts (OIDC issuer) ----

  accounts:
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace/deploy/node-postgres
    command:
      - deno
      - run
      - -A
      - src/server.ts
    environment:
      PORT: "8787"
      TAKOSUMI_ACCOUNTS_HOSTNAME: 0.0.0.0
      TAKOSUMI_ACCOUNTS_ISSUER: https://accounts.takos.test
      TAKOSUMI_ACCOUNTS_DATABASE_URL: postgres://takos:takos@postgres:5432/takosumi_accounts
      TAKOSUMI_ACCOUNTS_CLIENT_ID: takos-app
      TAKOSUMI_ACCOUNTS_REDIRECT_URIS: https://app.takos.test/oauth/callback https://cloud.takosumi.test/sign-in/callback
      TAKOSUMI_ACCOUNTS_MANAGED_OFFERING_ACCESS: closed
    volumes:
      - ../../../takosumi-cloud:/workspace
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://127.0.0.1:8787/.well-known/openid-configuration'); if(!r.ok) Deno.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - accounts

  # ---- Takosumi kernel (postgres profile) ----

  # kernel embeds runtime-agent in-process when TAKOSUMI_AGENT_URL is unset,
  # so we don't run a separate runtime-agent service for the local-substrate.
  # The image is a thin overlay on denoland/deno that adds docker CLI so
  # the embedded selfhost-docker-compose connector can spawn `docker compose`.
  kernel:
    profiles: ["postgres"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.kernel
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
      substrate-minio-init:
        condition: service_completed_successfully
    working_dir: /workspace
    # Use a wrapper that imports kernel + embedded agent from local source
    # (instead of takosumi-cli server which pins JSR-published kernel).
    command:
      - deno
      - run
      - -A
      - --config
      - /workspace/deno.json
      - /wrappers/kernel-with-embedded-agent.ts
    environment:
      PORT: "8788"
      TAKOSUMI_ENVIRONMENT: development
      TAKOSUMI_DATABASE_URL: postgres://takos:takos@postgres:5432/takosumi
      DATABASE_URL: postgres://takos:takos@postgres:5432/takosumi
      TAKOSUMI_DEPLOY_TOKEN: ${TAKOSUMI_DEPLOY_TOKEN:-local-substrate-deploy-token}
      TAKOSUMI_INTERNAL_API_SECRET: ${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}
      TAKOSUMI_DEV_MODE: "1"
      TAKOSUMI_DB_AUTO_MIGRATE: "true"
      # Selfhost provider config (consumed by embedded runtime-agent)
      TAKOSUMI_SELFHOSTED_OBJECT_STORE_ENDPOINT: http://minio:9000
      TAKOSUMI_SELFHOSTED_DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - ../../../takosumi:/workspace
      - ./wrappers:/wrappers:ro
      - ./factories:/local-substrate-factories:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://127.0.0.1:8788/health'); if(!r.ok) Deno.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      takos-local-internal:
        aliases:
          - kernel

  # ---- Takosumi kernel (workers profile) — Phase 1b で実装 ----
  kernel-workers:
    profiles: ["workers"]
    image: node:22-alpine
    restart: unless-stopped
    command: ["sh", "-c", "echo 'workers profile not yet implemented' && sleep infinity"]
    networks:
      takos-local-internal:
        aliases:
          - kernel

  # ---- Takos product ----

  # takos-app uses the local-platform package (Postgres + Redis + libsql)
  # instead of the apps/api Deno entry which expects D1 bindings.
  # Entry: takos/app/apps/control/deno.json → dev:local:web →
  #   packages/control/local-platform/src/web.ts
  takos-app:
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
      substrate-redis:
        condition: service_healthy
      accounts:
        condition: service_healthy
    working_dir: /workspace/apps/control
    command: ["deno", "task", "dev:local:web"]
    environment:
      PORT: "8787"
      ADMIN_DOMAIN: app.takos.test
      TENANT_BASE_DOMAIN: app.takos.test
      AUTH_PUBLIC_BASE_URL: https://app.takos.test
      OIDC_ISSUER_URL: https://accounts.takos.test
      OIDC_CLIENT_ID: takos-app
      OIDC_REDIRECT_URI: https://app.takos.test/oauth/callback
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-local-substrate-oidc-client-secret}
      TAKOS_LOCAL_DATA_DIR: /var/lib/takos-local-substrate
      TAKOS_LOCAL_DATABASE_URL: postgres://takos:takos@postgres:5432/takos_app
      REDIS_URL: redis://redis:6379
      TAKOS_INTERNAL_SERVICE_SECRET: ${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}
    volumes:
      - ../../app:/workspace
      - ../../git:/git:ro
      - takos-app-data:/var/lib/takos-local-substrate
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://127.0.0.1:8787/health'); if(!r.ok) Deno.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      takos-local-internal:
        aliases:
          - takos-app

  takos-git:
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command: ["deno", "task", "dev"]
    environment:
      PORT: "8790"
      TAKOS_GIT_INTERNAL_URL: http://takos-git:8790
      TAKOS_INTERNAL_SERVICE_SECRET: ${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}
      TAKOS_GIT_REPOSITORY_ROOT: /var/lib/takos-git/repositories
      TAKOS_GIT_DATABASE_URL: sqlite:///var/lib/takos-git/repositories/.takos/git.sqlite
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"
    volumes:
      - ../../git:/workspace
      - takos-git-node-modules:/workspace/node_modules
      - takos-git-repos:/var/lib/takos-git/repositories
    networks:
      takos-local-internal:
        aliases:
          - takos-git

  # ---- takosumi landing (SolidStart, mirrors takosumi.com root) ----
  takosumi-website-build:
    profiles: ["postgres"]
    image: node:22-slim
    restart: "no"
    working_dir: /website
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules ]; then
          npm install --no-fund --no-audit
        fi
        npm run build
    volumes:
      - ../../../takosumi/website:/website

  # ---- takosumi docs (VitePress, mirrors takosumi.com/docs/) ----
  takosumi-docs-build:
    profiles: ["postgres"]
    # Debian-based (not alpine) — vitepress / rollup pull glibc-flavored
    # native binaries; alpine + musl breaks the install.
    image: node:22-slim
    restart: "no"
    working_dir: /docs
    command:
      - sh
      - -c
      - |
        # vitepress needs git for lastUpdated metadata, and may need
        # rebuilt native modules if the host's node_modules were from a
        # different libc.
        apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates >/dev/null
        if [ -f node_modules/rollup/dist/native.js ] && \
           ! ldd node_modules/rollup/dist/native.js >/dev/null 2>&1; then
          rm -rf node_modules
        fi
        if [ ! -d node_modules ]; then
          npm install --no-fund --no-audit
        fi
        npm run build
    volumes:
      - ../../../takosumi/docs:/docs

  # ---- takos landing (SolidStart, mirrors takos.jp root) ----
  takos-website-build:
    profiles: ["postgres"]
    image: node:22-slim
    restart: "no"
    working_dir: /website
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules ]; then
          npm install --no-fund --no-audit
        fi
        # Point the cloud-install CTA at the local-substrate cloud mirror
        # instead of cloud.takosumi.com so links work end-to-end in the
        # local test bed.
        export VITE_CLOUD_INSTALL_URL="https://cloud.takosumi.test/apps/install?git=https%3A%2F%2Fgithub.com%2Ftako0614%2Ftakos.git&ref=main&mode=shared-cell&autopreview=1"
        npm run build
    volumes:
      - ../../../takos/website:/website

  # ---- install_preview mock (stands in for takosumi-git's preview API) ----
  # Returns deterministic fake {appId, source.commit, source.*Digest} so the
  # install wizard can complete preview → install end-to-end without a real
  # git mirror behind it.
  install-preview-mock:
    profiles: ["postgres"]
    image: denoland/deno:alpine-2.1.4
    restart: unless-stopped
    command: ["run", "--allow-net", "--allow-env=PORT", "--allow-read=/srv", "/srv/main.ts"]
    volumes:
      - ./install-preview-mock/main.ts:/srv/main.ts:ro
      - ./install-preview-mock/fixtures:/srv/fixtures:ro
    networks:
      takos-local-internal:
        aliases:
          - install-preview-mock

  # ---- OpenTelemetry collector + Jaeger (trace + metric sink) ----
  # No service emits OTel today, but the collector + UI are sitting here so
  # the moment instrumentation lands (accounts-service / kernel / takos-app)
  # you can verify traces flow end-to-end:
  #   1. service exports OTLP → collector at otel-collector:4317 (gRPC) /
  #      4318 (HTTP)
  #   2. collector forwards to Jaeger at jaeger:4317 (OTLP) / 14250 (jaeger)
  #   3. Jaeger UI at https://jaeger.takos.test/ shows the spans
  jaeger:
    profiles: ["postgres"]
    image: jaegertracing/jaeger:2.4.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      takos-local-internal:
        aliases:
          - jaeger

  otel-collector:
    profiles: ["postgres"]
    image: otel/opentelemetry-collector-contrib:0.118.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      takos-local-internal:
        aliases:
          - otel-collector

  # ---- mailpit SMTP catcher (catches anything any service sends) ----
  # Backends don't send email today, but the infra is here so that the
  # moment they start (signup confirmation, billing alerts, invite mail)
  # the smoke can assert the bytes arrived. Web UI at
  # https://mailpit.takos.test/, SMTP at mailpit:1025 (in-network).
  mailpit:
    profiles: ["postgres"]
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    networks:
      takos-local-internal:
        aliases:
          - mailpit

  # ---- oauth-mock (stands in for accounts.google.com + github.com) ----
  # Auto-approves /authorize and returns deterministic /userinfo so the
  # cloud sign-in flow (Google / GitHub button) completes without external
  # network. Reachable from browser + worker via Caddy at oauth-mock.test.
  oauth-mock:
    profiles: ["postgres"]
    image: denoland/deno:alpine-2.1.4
    restart: unless-stopped
    command: ["run", "--allow-net", "--allow-env=PORT", "/srv/main.ts"]
    volumes:
      - ./oauth-mock/main.ts:/srv/main.ts:ro
    networks:
      takos-local-internal:
        aliases:
          - oauth-mock

  # ---- yurucommu landing (plain HTML, mirrors yurucommu.com root) ----
  # No build step; site/ ships as static files. This service exists so
  # `docker compose up` shows yurucommu in the topology summary even
  # though no work runs.
  yurucommu-site-noop:
    profiles: ["postgres"]
    image: alpine:3.20
    restart: "no"
    command: ["sh", "-c", "echo 'yurucommu site is static — no build needed'"]
    volumes:
      - ../../../yurucommu/site:/site:ro

  # ---- takosumi-cloud dashboard SPA (mirrors cloud.takosumi.com root) ----
  takosumi-cloud-dashboard-build:
    profiles: ["postgres"]
    image: node:22-slim
    restart: "no"
    working_dir: /dashboard
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules ]; then
          npm install --no-fund --no-audit
        fi
        npm run build
    volumes:
      - ../../../takosumi-cloud/packages/dashboard-ui:/dashboard

  # ---- takosumi-cloud Worker (mirrors cloud.takosumi.com on Cloudflare Workers) ----
  takosumi-cloud-worker-build:
    profiles: ["postgres"]
    image: denoland/deno:2.7.10
    restart: "no"
    working_dir: /work
    command:
      - sh
      - -c
      - |
        mkdir -p deploy/cloudflare/.wrangler/dist
        deno bundle \
          --config deploy/cloudflare/deno.json \
          --platform browser \
          deploy/cloudflare/src/worker.ts \
          -o deploy/cloudflare/.wrangler/dist/takosumi-cloud-accounts-worker.mjs
    volumes:
      - ../../../takosumi-cloud:/work

  takosumi-cloud-worker:
    profiles: ["postgres"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.takosumi-cloud-worker
    restart: unless-stopped
    depends_on:
      takosumi-cloud-worker-build:
        condition: service_completed_successfully
      install-preview-mock:
        condition: service_started
      oauth-mock:
        condition: service_started
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    environment:
      WORKER_SCRIPT: /worker/takosumi-cloud-accounts-worker.mjs
      WORKER_PORT: "8787"
      TAKOSUMI_ACCOUNTS_ISSUER: https://cloud.takosumi.test
      TAKOSUMI_ACCOUNTS_SUBJECT: tsub_takosumi_cloud_local
      TAKOSUMI_ACCOUNTS_CLIENT_ID: takos-app-local
      TAKOSUMI_ACCOUNTS_REDIRECT_URIS: https://app.takos.test/oauth/callback https://cloud.takosumi.test/sign-in/callback
      # Managed-offering gate flipped to 'open' for the local test bed so
      # install / signup / billing flows are reachable. The digest is the
      # sha256 of the literal string 'local-substrate-readiness-v1' and the
      # refs point at the launch-readiness docs in takos-private. None of
      # this is production evidence — it's a deterministic local fixture.
      TAKOSUMI_ACCOUNTS_MANAGED_OFFERING_ACCESS: open
      TAKOSUMI_ACCOUNTS_MANAGED_OFFERING_READINESS_DIGEST: "sha256:e35f7540857c615ddd26a779ca95674237c649bbb99712e7e795e3bdc9ce3357"
      TAKOSUMI_ACCOUNTS_MANAGED_OFFERING_EVIDENCE_REF: "git+https://github.com/tako0614/takos-private.git#docs/launch-readiness/p0-evidence.md"
      TAKOSUMI_ACCOUNTS_MANAGED_OFFERING_APPROVAL_REF: "git+https://github.com/tako0614/takos-private.git#docs/launch-readiness/p0-approval.md"
      TAKOSUMI_ACCOUNTS_MANAGED_OFFERING_PUBLIC_SUMMARY: "Local substrate p0 staged rehearsal — evidence retained with rehearsal log; no production traffic served."
      # Mock install-preview service running in the same docker network.
      TAKOSUMI_ACCOUNTS_INSTALL_PREVIEW_URL: http://install-preview-mock:8788
      # Upstream OAuth — pointed at the local oauth-mock for both google +
      # github so the cloud sign-in flow can complete without external network.
      # SUBJECT_SECRET is required when any upstream provider is configured;
      # the value is a deterministic local-only secret (not production).
      TAKOSUMI_ACCOUNTS_SUBJECT_SECRET: "local-substrate-upstream-subject-secret-v1"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_CLIENT_ID: "takos-cloud-local-google"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_CLIENT_SECRET: "mock-secret-google"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_REDIRECT_URI: "https://cloud.takosumi.test/sign-in/callback"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_ISSUER: "https://oauth-mock.test/google"
      # ====================================================================
      # LOCAL ONLY — workerd TLS divergence.
      # Production: ALL upstream OAuth endpoints (Google + GitHub) are HTTPS.
      # Here: /authorize is HTTPS via Caddy (browser-facing), but /token +
      # /userinfo are plain HTTP through the docker network because workerd's
      # TLS trust store does not include the Pebble root and adding it
      # requires patching the workerd binary (deferred).
      # The negative-path coverage that the worker correctly surfaces
      # upstream 5xx/TLS errors is provided by scripts/oauth-tls-negative.sh
      # (smoke check: oauth.tls-negative). Do NOT copy this env block to
      # production deploys.
      # ====================================================================
      TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_AUTHORIZATION_ENDPOINT: "https://oauth-mock.test/google/authorize"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_TOKEN_ENDPOINT: "http://oauth-mock:8789/google/token"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GOOGLE_USERINFO_ENDPOINT: "http://oauth-mock:8789/google/userinfo"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_CLIENT_ID: "takos-cloud-local-github"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_CLIENT_SECRET: "mock-secret-github"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_REDIRECT_URI: "https://cloud.takosumi.test/sign-in/callback"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_ISSUER: "https://oauth-mock.test/github"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_AUTHORIZATION_ENDPOINT: "https://oauth-mock.test/github/authorize"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_TOKEN_ENDPOINT: "http://oauth-mock:8789/github/access_token"
      TAKOSUMI_ACCOUNTS_UPSTREAM_GITHUB_USERINFO_ENDPOINT: "http://oauth-mock:8789/github/user"
      # Custom OIDC slot wired to oauth-mock's /tls-fail endpoints. The
      # provider id 'tls-fail' is local-only; scripts/oauth-tls-negative.sh
      # uses it to assert the worker returns 502 upstream_oauth_failed
      # when upstream /token returns 5xx (which is what a TLS handshake
      # failure would look like in production).
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_PROVIDER_ID: "tls-fail"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_ISSUER: "https://oauth-mock.test/tls-fail"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_AUTHORIZATION_ENDPOINT: "https://oauth-mock.test/tls-fail/authorize"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_TOKEN_ENDPOINT: "http://oauth-mock:8789/tls-fail/token"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_USERINFO_ENDPOINT: "http://oauth-mock:8789/tls-fail/userinfo"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_CLIENT_ID: "takos-cloud-local-tls-fail"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_CLIENT_SECRET: "mock-secret-tls-fail"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_REDIRECT_URI: "https://cloud.takosumi.test/sign-in/callback"
      TAKOSUMI_ACCOUNTS_UPSTREAM_OIDC_SUBJECT_CLAIM: "sub"
      # Passkey RP config — required for the WebAuthn flow. RP ID is the
      # domain (no scheme); origin is the full https origin.
      TAKOSUMI_ACCOUNTS_PASSKEY_RP_ID: cloud.takosumi.test
      TAKOSUMI_ACCOUNTS_PASSKEY_RP_NAME: "Takosumi Cloud (local)"
      TAKOSUMI_ACCOUNTS_PASSKEY_ORIGIN: https://cloud.takosumi.test
      # Stripe billing — local-only fixture secrets. Webhook replay script
      # (scripts/stripe-webhook-replay.py) signs events with WEBHOOK_SECRET.
      # SECRET_KEY is only used for outbound checkout creation; not exercised
      # in webhook tests but required by the worker's config validation.
      TAKOSUMI_ACCOUNTS_STRIPE_SECRET_KEY: "sk_test_local_substrate_fixture"
      TAKOSUMI_ACCOUNTS_STRIPE_WEBHOOK_SECRET: "whsec_local_substrate_fixture_v1"
    volumes:
      - ../../../takosumi-cloud/deploy/cloudflare/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-cloud-worker-runner.mjs:/app/runner.mjs:ro
      - takosumi-cloud-worker-data:/data
    networks:
      takos-local-internal:
        aliases:
          - takosumi-cloud-worker

  # ---- Phase 3 route registrar ----
  # Polls kernel for applied deployments and mirrors their routes into
  # Caddy admin API as dynamic reverse_proxy entries.
  route-registrar:
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      kernel:
        condition: service_healthy
    working_dir: /app
    command: ["deno", "task", "start"]
    environment:
      KERNEL_URL: http://kernel:8788
      CADDY_ADMIN_URL: http://caddy:2019
      KERNEL_DEPLOY_TOKEN: ${TAKOSUMI_DEPLOY_TOKEN:-local-substrate-deploy-token}
      POLL_INTERVAL_MS: "5000"
    volumes:
      - ./route-registrar:/app:ro
    networks:
      - takos-local-internal

volumes:
  substrate-postgres-data:
  substrate-redis-data:
  substrate-minio-data:
  takos-git-node-modules:
  takos-git-repos:
  takos-app-data:
  takosumi-cloud-worker-data:

networks:
  takos-local-internal:
    external: true
    name: local-substrate_takos-local-internal
